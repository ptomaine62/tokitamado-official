function getRollingOwnerId(game) {
  if (!game || !ROLLING_STATUSES.has(game.status)) {
    return null;
  }

  return game.lastDiceOwnerId || null;
}

function getRandomDiceFaces(count) {
  return Array.from({ length: count }, () => Math.floor(Math.random() * 6) + 1);
}

function getShownDiceFaces(playerId, realFaces) {
  const game = appState?.activeGame;
  const ownerId = getRollingOwnerId(game);

  if (!ownerId || ownerId !== playerId) {
    return realFaces;
  }

  if (game.id === "hp_crash") {
    return getRandomDiceFaces(2);
  }

  return getRandomDiceFaces(1);
}

function getShownCombatFaces(game) {
  const faces = game?.lastDiceFaces || game?.diceFaces?.last || [];

  if (game && ROLLING_STATUSES.has(game.status)) {
    return getRandomDiceFaces(2);
  }

  return faces;
}

function getShownCombatRoll(game) {
  if (game && ROLLING_STATUSES.has(game.status)) {
    return "…";
  }

  return game?.lastRoll ?? "–";
}

function applyDiceRollingClass() {
  document.querySelectorAll("[data-dice-illustration]").forEach((target) => {
    target.classList.remove("rolling");
  });

  const game = appState?.activeGame;

  if (!game || !ROLLING_STATUSES.has(game.status)) {
    clearDiceAnimationTimersExcept("");
    return;
  }

  const ownerId = getRollingOwnerId(game);

  if (!ownerId) {
    return;
  }

  const selector =
    game.id === "hp_crash"
      ? `[data-dice-illustration="combat"], [data-dice-illustration="${CSS.escape(ownerId)}"]`
      : `[data-dice-illustration="${CSS.escape(ownerId)}"]`;

  document.querySelectorAll(selector).forEach((target) => {
    target.classList.add("rolling");
  });

  const key = `${game.id}:${game.status}:${game.lastDiceOwnerId}:${game.phaseUntilMs}:${game.lastRoll}:${JSON.stringify(game.diceFaces || {})}`;

  clearDiceAnimationTimersExcept(key);

  if (diceAnimationTimers.has(key)) {
    return;
  }

  const ui = getUiConfig();
  const intervalMs = Math.max(30, Number(ui.diceAnimationIntervalMs || 55));

  const timer = setInterval(() => {
    const liveGame = appState?.activeGame;

    if (!liveGame || !ROLLING_STATUSES.has(liveGame.status)) {
      clearInterval(timer);
      diceAnimationTimers.delete(key);
      forceRender();
      return;
    }

    document.querySelectorAll(selector).forEach((target) => {
      const count = liveGame.id === "hp_crash" ? 2 : 1;
      target.innerHTML = renderDiceFaces(getRandomDiceFaces(count));
    });
  }, intervalMs);

  diceAnimationTimers.set(key, timer);
}

function clearDiceAnimationTimersExcept(activeKey) {
  for (const [key, timer] of diceAnimationTimers.entries()) {
    if (key === activeKey) {
      continue;
    }

    clearInterval(timer);
    diceAnimationTimers.delete(key);
  }
}

function unlockAudio() {
  if (!audioContext) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if (AudioContextClass) {
      audioContext = new AudioContextClass();
    }
  }

  if (audioContext && audioContext.state === "suspended") {
    audioContext.resume().catch(() => {});
  }
}

function playToneForMessage(tone, force = false) {
  const audio = getAudioConfig();

  if (!force && !audio.soundEnabled) {
    return;
  }

  if (!audioContext) {
    return;
  }

  const now = audioContext.currentTime;
  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();

  let frequency = 440;
  let duration = 0.09;

  if (tone === "stim") {
    frequency = 660;
    duration = 0.12;
  } else if (tone === "critical" || tone === "release") {
    frequency = 220;
    duration = 0.18;
  } else if (tone === "win") {
    frequency = 880;
    duration = 0.16;
  } else if (tone === "notice") {
    frequency = 520;
    duration = 0.1;
  }

  oscillator.type = tone === "critical" ? "sawtooth" : "sine";
  oscillator.frequency.setValueAtTime(frequency, now);
  oscillator.frequency.exponentialRampToValueAtTime(Math.max(80, frequency * 0.72), now + duration);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.08, now + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  oscillator.connect(gain);
  gain.connect(audioContext.destination);

  oscillator.start(now);
  oscillator.stop(now + duration + 0.02);
}

function speakMessage(speechText, tone) {
  const audio = getAudioConfig();

  if (!audio.speechEnabled) {
    return;
  }

  const normalized = String(speechText || "").trim();

  if (!normalized) {
    return;
  }

  const isCountdown = /^[0-9]+$/.test(normalized);

  if (isCountdown && !audio.announceCountdown) {
    return;
  }

  if (tone === "normal" && !audio.announceTurn) {
    return;
  }

  if ((tone === "stim" || tone === "critical" || tone === "release") && !audio.announceStim) {
    return;
  }

  if (tone === "win" && !audio.announceResult) {
    return;
  }

  speakText(normalized, false);
}

function speakText(text, force = false) {
  const audio = getAudioConfig();

  if (!force && !audio.speechEnabled) {
    return;
  }

  if (!("speechSynthesis" in window)) {
    return;
  }

  const p1 = getPlayer("p1");
  const p2 = getPlayer("p2");

  const clean = String(text || "")
    .replaceAll("P1", p1?.reading || p1?.name || "プレイヤーいち")
    .replaceAll("P2", p2?.reading || p2?.name || "プレイヤーに")
    .replace(/[⚀⚁⚂⚃⚄⚅🎲⚔🔥]/g, "")
    .replace(/\s+/g, " ")
    .trim();

  if (!clean) {
    return;
  }

  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = "ja-JP";
  utterance.rate = clampClient(audio.speechRate || 1, 0.5, 1.8);
  utterance.pitch = clampClient(audio.speechPitch || 1, 0.5, 2.0);
  utterance.volume = clampClient(audio.speechVolume || 1, 0, 1);

  if (audio.voiceName && availableVoices.length > 0) {
    const voice = availableVoices.find((item) => item.name === audio.voiceName);

    if (voice) {
      utterance.voice = voice;
    }
  }

  window.speechSynthesis.speak(utterance);
}

function loadVoices() {
  if (!("speechSynthesis" in window)) {
    return;
  }

  const voices = window.speechSynthesis.getVoices() || [];

  availableVoices = voices
    .slice()
    .sort((a, b) => {
      const aJa = a.lang && a.lang.toLowerCase().startsWith("ja") ? 0 : 1;
      const bJa = b.lang && b.lang.toLowerCase().startsWith("ja") ? 0 : 1;

      if (aJa !== bJa) {
        return aJa - bJa;
      }

      return a.name.localeCompare(b.name, "ja");
    });
}

function scrollTopSoon() {
  setTimeout(() => {
    window.scrollTo(0, 0);
  }, 0);
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    send("visibility_stop", {});
  }
});

window.addEventListener("beforeunload", () => {
  try {
    send("visibility_stop", {});
  } catch (error) {
    console.error(error);
  }
});

window.addEventListener("pagehide", () => {
  try {
    send("visibility_stop", {});
  } catch (error) {
    console.error(error);
  }
});

if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    loadVoices();
    forceRender();
  };

  loadVoices();

  setTimeout(() => {
    loadVoices();
  }, 500);
}

connectWebSocket();
