<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SHOCKiG REARENA MOCK</title>
  <style>
:root {
  --bg: #08090c;
  --panel: #11131a;
  --panel-2: #171a23;
  --panel-3: #202432;
  --text: #f4f7fb;
  --muted: #9aa4b2;
  --muted-2: #647084;
  --line: #262b38;
  --accent: #7dd3fc;
  --accent-2: #38bdf8;
  --danger: #ef4444;
  --danger-2: #991b1b;
  --safe: #22c55e;
  --warn: #facc15;
  --purple: #a78bfa;
  --orange: #f97316;
  --orange-2: #fb923c;
  --yellow: #fde68a;
  --green: #86efac;

  --p1: #00aeef;
  --p1-soft: rgba(0, 174, 239, 0.22);
  --p1-line: rgba(0, 174, 239, 0.85);

  --p2: #ff3eb5;
  --p2-soft: rgba(255, 62, 181, 0.22);
  --p2-line: rgba(255, 62, 181, 0.85);

  --p3: #22c55e;
  --p3-soft: rgba(34, 197, 94, 0.22);
  --p3-line: rgba(34, 197, 94, 0.85);

  --p4: #facc15;
  --p4-soft: rgba(250, 204, 21, 0.22);
  --p4-line: rgba(250, 204, 21, 0.85);

  --p5: #f97316;
  --p5-soft: rgba(249, 115, 22, 0.22);
  --p5-line: rgba(249, 115, 22, 0.85);

  --p6: #a855f7;
  --p6-soft: rgba(168, 85, 247, 0.22);
  --p6-line: rgba(168, 85, 247, 0.85);

  --shadow: rgba(0, 0, 0, 0.35);
  --radius: 10px;
  --button-radius: 22px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --gauge-ms: 520ms;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at 50% -18%, #182033 0%, transparent 54%),
    radial-gradient(circle at top, #131827 0%, #08090c 48%, #050609 100%);
  color: var(--text);
  font-family:
    "BIZ UDPGothic",
    "Noto Sans JP",
    "Noto Sans CJK JP",
    "Hiragino Sans",
    "Yu Gothic UI",
    "Yu Gothic",
    "Meiryo",
    system-ui,
    sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

button,
input,
select {
  font: inherit;
}

button {
  border: 0;
}

.app-shell {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: calc(18px + var(--safe-top)) 18px calc(18px + var(--safe-bottom));
  transition: transform 160ms ease;
  transform-origin: center center;
}

.app-shell.screen-rotated {
  transform: rotate(180deg);
}

.screen {
  min-height: calc(100vh - 36px - var(--safe-top) - var(--safe-bottom));
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.hero {
  min-height: calc(100vh - 36px - var(--safe-top) - var(--safe-bottom));
  display: grid;
  place-items: center;
}

.hero-card {
  width: min(720px, 100%);
  background: linear-gradient(180deg, rgba(17, 19, 26, 0.96), rgba(8, 9, 12, 0.96));
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 32px;
  box-shadow: 0 24px 70px var(--shadow);
}

.brand-kicker {
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.brand-title {
  margin: 8px 0 0;
  font-size: clamp(38px, 9vw, 76px);
  line-height: 0.95;
  letter-spacing: -0.06em;
}

.brand-ja {
  margin-top: 12px;
  color: var(--accent);
  font-size: clamp(22px, 5vw, 38px);
  font-weight: 800;
  letter-spacing: 0.08em;
}

.notice {
  margin-top: 28px;
  padding: 18px;
  background: rgba(250, 204, 21, 0.08);
  border: 1px solid rgba(250, 204, 21, 0.22);
  border-radius: var(--radius);
  color: #fef3c7;
  line-height: 1.75;
}

.header {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 14px;
  padding: 8px 0;
  backdrop-filter: blur(10px);
}

.header-main {
  min-width: 0;
}

.header-title {
  margin: 0;
  font-size: clamp(26px, 5vw, 42px);
  letter-spacing: -0.04em;
}

.header-sub {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: flex-end;
  flex: 0 0 auto;
}

.status-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  padding: 7px 12px;
  background: rgba(17, 19, 26, 0.88);
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  font-size: 13px;
}

.dot {
  font-size: 18px;
  line-height: 1;
}

.dot.connected {
  color: var(--safe);
}

.dot.reconnecting {
  color: var(--warn);
}

.dot.disconnected {
  color: var(--danger);
}

.dot.safe-reconnected {
  color: var(--orange);
}

.grid {
  display: grid;
  gap: 16px;
}

.grid.two {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.card {
  background: rgba(17, 19, 26, 0.92);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
}

.card.soft {
  background: rgba(17, 19, 26, 0.72);
}

.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 0 0 14px;
  font-size: 18px;
}

.label {
  display: block;
  margin: 14px 0 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.input,
.select,
.number-input {
  width: 100%;
  height: 44px;
  padding: 0 12px;
  color: var(--text);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  outline: none;
}

.input:focus,
.select:focus,
.number-input:focus {
  border-color: rgba(125, 211, 252, 0.72);
  box-shadow: 0 0 0 4px rgba(125, 211, 252, 0.1);
}

.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 0;
}

.switch {
  position: relative;
  width: 58px;
  height: 34px;
  border-radius: 999px;
  background: #303542;
  cursor: pointer;
  flex: 0 0 auto;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.switch.on {
  background: rgba(34, 197, 94, 0.86);
}

.switch::after {
  content: "";
  position: absolute;
  top: 4px;
  left: 4px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: white;
  transition: transform 120ms ease;
}

.switch.on::after {
  transform: translateX(24px);
}

.range-row {
  display: grid;
  grid-template-columns: 1fr 80px;
  gap: 12px;
  align-items: center;
}

.range {
  width: 100%;
  accent-color: var(--accent-2);
}

.tap-number {
  min-width: 72px;
  height: 42px;
  display: grid;
  place-items: center;
  padding: 0 10px;
  background: linear-gradient(180deg, #202637, #171c29);
  border: 1px solid rgba(125, 211, 252, 0.28);
  border-radius: var(--button-radius);
  color: var(--accent);
  font-weight: 800;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  min-height: 46px;
  padding: 0 18px;
  border-radius: var(--button-radius);
  color: var(--text);
  background: linear-gradient(180deg, #2a3040, #1b202c);
  border: 1px solid rgba(125, 211, 252, 0.22);
  cursor: pointer;
  font-weight: 800;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.06),
    0 6px 18px rgba(0, 0, 0, 0.18);
  transition:
    transform 80ms ease,
    background 120ms ease,
    border-color 120ms ease,
    filter 120ms ease;
}

.btn:hover {
  border-color: rgba(125, 211, 252, 0.72);
  filter: brightness(1.08);
}

.btn:active {
  transform: translateY(1px) scale(0.99);
}

.btn.primary {
  background: linear-gradient(180deg, #0891b2, #0369a1);
  border-color: rgba(125, 211, 252, 0.48);
}

.btn.danger {
  background: linear-gradient(180deg, #dc2626, #991b1b);
  border-color: rgba(248, 113, 113, 0.48);
}

.btn.pause {
  background: linear-gradient(180deg, #facc15, #ca8a04);
  border-color: rgba(250, 204, 21, 0.62);
  color: #17120a;
}

.btn.resume {
  background: linear-gradient(180deg, #22c55e, #15803d);
  border-color: rgba(134, 239, 172, 0.5);
  color: white;
}

.btn.ghost {
  background: rgba(255, 255, 255, 0.03);
}

.btn.release {
  background: linear-gradient(180deg, #f97316, #c2410c);
  border-color: rgba(251, 146, 60, 0.58);
}

.btn.wide {
  width: 100%;
  min-height: 58px;
  font-size: 18px;
}

.btn.big {
  min-height: 82px;
  min-width: 240px;
  padding: 0 34px;
  font-size: clamp(24px, 5vw, 36px);
  border-radius: 28px;
}

.btn.icon {
  width: 46px;
  min-width: 46px;
  height: 46px;
  padding: 0;
  display: grid;
  place-items: center;
  border-radius: 50%;
  font-size: 22px;
}

.btn:disabled {
  opacity: 0.48;
  cursor: not-allowed;
  filter: grayscale(0.25);
}

.game-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.game-card {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.game-title {
  margin: 0;
  font-size: 20px;
}

.game-subtitle {
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
}

.game-desc {
  color: var(--muted);
  line-height: 1.6;
  min-height: 52px;
}

.tag-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  padding: 5px 8px;
  background: rgba(125, 211, 252, 0.08);
  border: 1px solid rgba(125, 211, 252, 0.16);
  border-radius: 999px;
  color: #bae6fd;
  font-size: 12px;
}

.play-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.battle-main {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex: 1;
}

.desktop-hud {
  display: grid;
}

.mobile-hud {
  display: none;
  gap: 8px;
}

.player-battle-card {
  position: relative;
  overflow: hidden;
  min-height: 190px;
  border-left-width: 8px;
}

.player-battle-card::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0.7;
  pointer-events: none;
}

.player-battle-card > * {
  position: relative;
  z-index: 1;
}

.player-tone-1,
.player-battle-card.player-tone-1 {
  border-color: var(--p1-line);
  border-left-color: var(--p1);
  background:
    radial-gradient(circle at top right, var(--p1-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.player-tone-2,
.player-battle-card.player-tone-2 {
  border-color: var(--p2-line);
  border-left-color: var(--p2);
  background:
    radial-gradient(circle at top right, var(--p2-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.player-tone-3,
.player-battle-card.player-tone-3 {
  border-color: var(--p3-line);
  border-left-color: var(--p3);
  background:
    radial-gradient(circle at top right, var(--p3-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.player-tone-4,
.player-battle-card.player-tone-4 {
  border-color: var(--p4-line);
  border-left-color: var(--p4);
  background:
    radial-gradient(circle at top right, var(--p4-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.player-tone-5,
.player-battle-card.player-tone-5 {
  border-color: var(--p5-line);
  border-left-color: var(--p5);
  background:
    radial-gradient(circle at top right, var(--p5-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.player-tone-6,
.player-battle-card.player-tone-6 {
  border-color: var(--p6-line);
  border-left-color: var(--p6);
  background:
    radial-gradient(circle at top right, var(--p6-soft), transparent 42%),
    rgba(17, 19, 26, 0.94);
}

.tone-text-1 {
  color: var(--p1);
}

.tone-text-2 {
  color: var(--p2);
}

.tone-text-3 {
  color: var(--p3);
}

.tone-text-4 {
  color: var(--p4);
}

.tone-text-5 {
  color: var(--p5);
}

.tone-text-6 {
  color: var(--p6);
}

.player-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  margin-bottom: 6px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  color: white;
  font-size: 12px;
  font-weight: 950;
}

.player-name-inline {
  font-weight: 950;
  text-shadow: 0 0 18px currentColor;
}

.player-name {
  margin: 0;
  font-size: clamp(28px, 7vw, 48px);
  letter-spacing: -0.04em;
}

.metric {
  margin-top: 16px;
}

.metric-head {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 7px;
}

.bar {
  height: 16px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 999px;
  overflow: hidden;
}

.bar.thin {
  height: 8px;
}

.bar-fill {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent-2), var(--purple));
  transition: width var(--gauge-ms) cubic-bezier(0.16, 1, 0.3, 1);
  will-change: width;
}

.bar-fill.debt {
  background: linear-gradient(90deg, #facc15, #ef4444);
}

.bar-fill.output {
  background: linear-gradient(90deg, #fb923c, #ef4444);
}

.output-line {
  margin-top: 12px;
  color: var(--muted);
  font-size: 14px;
}

.mini-hud {
  border: 1px solid var(--line);
  border-left-width: 7px;
  border-radius: var(--radius);
  padding: 8px 10px;
  min-width: 0;
}

.mini-top {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  align-items: center;
  margin-bottom: 5px;
}

.mini-name {
  font-weight: 950;
  font-size: 16px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-value {
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  text-align: right;
  white-space: nowrap;
}

.mini-line {
  display: grid;
  grid-template-columns: 38px 1fr 38px;
  gap: 6px;
  align-items: center;
  margin-top: 4px;
}

.mini-label {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.game-center {
  text-align: center;
  flex: 1;
}

.round-label {
  color: var(--muted);
  font-weight: 800;
  letter-spacing: 0.12em;
}

.game-message-box {
  margin-top: 10px;
  min-height: 132px;
  display: grid;
  align-content: center;
  gap: 6px;
  padding: 16px;
  border: 1px solid rgba(125, 211, 252, 0.14);
  border-radius: var(--radius);
  background:
    radial-gradient(circle at top right, rgba(125, 211, 252, 0.08), transparent 48%),
    rgba(255, 255, 255, 0.035);
}

.game-message-line {
  font-size: clamp(22px, 5.4vw, 40px);
  font-weight: 950;
  line-height: 1.16;
  letter-spacing: -0.04em;
  animation: messageLineIn 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

.game-message-line.sub {
  font-size: clamp(18px, 4.6vw, 30px);
}

.game-message-line.detail {
  font-size: clamp(16px, 4vw, 24px);
}

@keyframes messageLineIn {
  from {
    opacity: 0.25;
    transform: translateY(5px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tone-normal .game-message-line {
  color: var(--text);
}

.tone-notice .game-message-line {
  color: #fde68a;
  text-shadow: 0 0 18px rgba(250, 204, 21, 0.14);
}

.tone-stim .game-message-line {
  color: var(--orange-2);
  text-shadow: 0 0 20px rgba(249, 115, 22, 0.26);
}

.tone-critical .game-message-line {
  color: #fb7185;
  text-shadow: 0 0 26px rgba(251, 113, 133, 0.34);
}

.tone-release .game-message-line {
  color: #fdba74;
  text-shadow: 0 0 28px rgba(249, 115, 22, 0.34);
}

.tone-safe .game-message-line {
  color: #fecaca;
  text-shadow: 0 0 24px rgba(239, 68, 68, 0.28);
}

.tone-win .game-message-line {
  color: #86efac;
  text-shadow: 0 0 24px rgba(34, 197, 94, 0.28);
}

.message-advance-hint {
  margin-top: 12px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.message-advance-hint.ready {
  color: #fde68a;
}

.message-hold-clickable {
  cursor: pointer;
}

.pause-banner {
  margin-top: 10px;
  padding: 10px;
  color: #17120a;
  background: linear-gradient(180deg, #fde68a, #facc15);
  border-radius: var(--radius);
  font-weight: 950;
  text-align: center;
}

.dice-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 16px;
}

.dice-box {
  padding: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--line);
  border-left-width: 7px;
  border-radius: var(--radius);
  min-width: 0;
}

.dice-box.player-tone-1 {
  border-color: var(--p1-line);
  border-left-color: var(--p1);
  background: var(--p1-soft);
}

.dice-box.player-tone-2 {
  border-color: var(--p2-line);
  border-left-color: var(--p2);
  background: var(--p2-soft);
}

.dice-illustration {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 70px;
  margin-top: 4px;
  font-size: clamp(44px, 12vw, 78px);
  font-weight: 950;
  line-height: 1;
  letter-spacing: -0.04em;
}

.dice-illustration.rolling {
  animation: diceBounce 120ms ease-in-out infinite alternate;
}

.dice-face {
  display: inline-grid;
  place-items: center;
  min-width: 1em;
  transform-origin: center center;
  filter: drop-shadow(0 0 14px rgba(125, 211, 252, 0.22));
}

.dice-total {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.12em;
}

@keyframes diceBounce {
  from {
    transform: translateY(0) rotate(-2deg) scale(1);
  }

  to {
    transform: translateY(-4px) rotate(2deg) scale(1.04);
  }
}

.combat-result-panel {
  display: grid;
  grid-template-columns: minmax(116px, 0.9fr) minmax(0, 1.1fr);
  gap: 10px;
  margin-top: 12px;
  align-items: stretch;
}

.combat-result-box {
  display: grid;
  align-content: center;
  min-height: 120px;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-left-width: 7px;
  border-radius: var(--radius);
  background:
    radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 52%),
    rgba(255, 255, 255, 0.045);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  overflow: hidden;
}

.combat-result-label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.1em;
}

.combat-judge-value {
  margin-top: 5px;
  font-size: clamp(28px, 5.5vw, 56px);
  font-weight: 950;
  line-height: 1.03;
  letter-spacing: -0.05em;
  word-break: keep-all;
  overflow-wrap: anywhere;
}

.turn-panel {
  display: grid;
  grid-template-columns: 1fr auto 1fr;

        id: "estim_device_2",
        label: "低周波デバイス2",
        status: "disconnected",
        safeState: "DISCONNECTED",
        lastSeenMs: null,
        channels: {
          A: { output: 0.0, assignedPlayerId: null },
          B: { output: 0.0, assignedPlayerId: null }
        }
      }
    ];
  }

  const mockServer = {
    clients: new Set(),
    pulseEvents: [],
    testHold: null,

    state: {
      app: {
        name: "SHOCKiG REARENA",
        jaName: "リアリーナ",
        version: "0.1-alpha-014"
      },

      gameCatalog: GAME_CATALOG,

    },

    connect(socket) {
      this.clients.add(socket);

      setTimeout(() => {
        socket._open();
        socket._emitMessage({
          type: "state",
          payload: this.makePublicState()
        });
      }, 20);
    },

    disconnect(socket) {
      this.clients.delete(socket);

    makePublicState() {
      this.state.serverTimeMs = nowMs();
      this.state.config = CONFIG;
      this.rebuildAssignments();
      return clone(this.state);
    },

    broadcast() {
      const packet = {
        type: "state",
        payload: this.makePublicState()
      };

      for (const socket of this.clients) {

      }

    handleRaw(rawData) {
      let data = null;

      try {
        data = typeof rawData === "string" ? JSON.parse(rawData) : rawData;
      } catch (error) {
        console.error(error);
        return;
      }

      if (!data || typeof data !== "object") {
        return;
      }

      const type = data.type;
      const payload = data.payload && typeof data.payload === "object" ? data.payload : {};

      if (type === "start_app") {
        this.actionStartApp();
      } else if (type === "go_setup") {
        this.actionGoSetup();
      } else if (type === "go_game_select") {
        this.actionGoGameSelect();
      } else if (type === "go_config") {
        this.actionGoConfig();
      } else if (type === "go_spectator") {
        this.actionGoSpectator();
      } else if (type === "update_player") {
        this.actionUpdatePlayer(payload);
      } else if (type === "update_config") {
        this.actionUpdateConfig(payload);
      } else if (type === "save_config") {
        this.state.uiMessage = "設定を保存しました（モック）";
      } else if (type === "test_start") {
        this.actionTestStart(payload);
      } else if (type === "test_stop") {
        this.actionTestStop(payload);
      } else if (type === "select_game") {
        this.actionSelectGame(payload);
      } else if (type === "start_selected_game") {
        this.actionStartSelectedGame();
      } else if (type === "roll_dice") {
        this.actionRollDice();
      } else if (type === "release_power") {
        this.actionReleasePower();
      } else if (type === "advance_message") {
        this.actionAdvanceMessage();
      } else if (type === "give_up") {
        this.actionGiveUp(payload);
      } else if (type === "pause_toggle") {
        this.actionPauseToggle();
      } else if (type === "pause_game") {
        this.actionPauseGame();
      } else if (type === "resume_game") {
        this.actionResumeGame();
      } else if (type === "emergency_stop") {
        this.actionEmergencyStop();
      } else if (type === "resume_from_safe") {
        this.actionResumeFromSafe();
      } else if (type === "return_to_game_select") {
        this.actionReturnToGameSelect();
      } else if (type === "visibility_stop") {
        this.actionVisibilityStop();
      } else if (type === "clear_safe_reconnected") {
        this.actionClearSafeReconnected(payload);
      } else if (type === "set_device_status") {
        this.actionSetDeviceStatus(payload);
      }

      this.broadcast();
    },

    getPlayer(playerId) {
      return this.state.players.find((player) => player.id === playerId) || null;
    },

    getOtherPlayer(playerId) {
      return this.state.players.find((player) => player.id !== playerId) || null;
    },

    getGameCatalogItem(gameId) {
      return GAME_CATALOG.find((game) => game.id === gameId) || null;
    },

    rebuildAssignments() {
      for (const estimDevice of this.state.estimDevices) {
        for (const channelName of Object.keys(estimDevice.channels || {})) {
          estimDevice.channels[channelName].assignedPlayerId = null;
          estimDevice.channels[channelName].output = 0.0;
        }
      }

      for (const player of this.state.players) {
        const assignment = player.assignment || {};
        const estimDevice = this.state.estimDevices.find((device) => device.id === assignment.estimDeviceId);

        if (!estimDevice || !estimDevice.channels || !estimDevice.channels[assignment.channel]) {
          continue;
        }

        estimDevice.channels[assignment.channel].assignedPlayerId = player.id;
        estimDevice.channels[assignment.channel].output = clamp(player.realOutput, 0, 100);
      }
    },

    stopAllOutputs(reason, noisy = true) {
      this.pulseEvents = [];
      this.testHold = null;

      for (const player of this.state.players) {
        player.virtualOutput = 0.0;
        player.realOutput = 0.0;
      }

      for (const estimDevice of this.state.estimDevices) {
        for (const channel of Object.values(estimDevice.channels || {})) {
          channel.output = 0.0;
        }
      }

      if (noisy) {
        this.state.lastOutputStopReason = reason || "全停止";
      }
    },

    setPlayerOutput(playerId, value, reason = "") {
      const player = this.getPlayer(playerId);

      if (!player) {
        return;
      }

      let safeValue = clamp(value, 0, 100);

      if (!player.enabled || !player.outputEnabled || player.gaveUp) {
        safeValue = 0.0;
      }

      const limit = clamp(player.limit, 0, 100);
      safeValue = clamp(safeValue, 0, limit);

      player.virtualOutput = safeValue;
      player.realOutput = safeValue;

      if (reason) {
        this.state.lastOutputStopReason = reason;
      }
    },

    calculateOutputFromDebt(player) {
      const debt = clamp(player.debt, 0, 100);
      const limit = clamp(player.limit, 0, 100);
      return clamp(debt * limit / 100.0, 0, limit);
    },

    calculateEventOutput(player, bonusPercent, minPercent) {
      const base = this.calculateOutputFromDebt(player);
      const limit = clamp(player.limit, 0, 100);
      return clamp(Math.max(base + Number(bonusPercent || 0), Number(minPercent || 0)), 0, limit);
    },

    makePulseEvent(playerId, durationMs, bonusPercent, minPercent, reason) {
      return {
        playerId,
        untilMs: nowMs() + Number(durationMs || 900),
        bonusPercent: Number(bonusPercent || 0),
        minPercent: Number(minPercent || 0),
        reason: reason || "パルス"
      };
    },

    makePendingPulseEvent(playerId, durationMs, bonusPercent, minPercent, reason) {
      return {
        playerId,
        durationMs: Number(durationMs || 900),
        bonusPercent: Number(bonusPercent || 0),
        minPercent: Number(minPercent || 0),
        reason: reason || "パルス"
      };
    },

    activatePendingPulses(game) {
      const pending = game.pendingPulseEvents || [];
      game.pendingPulseEvents = [];
      game.pulseEvents = pending.map((event) => this.makePulseEvent(
        event.playerId,
        event.durationMs,
        event.bonusPercent,
        event.minPercent,
        event.reason
      ));

      game.pulseUntilMs = Math.max(...game.pulseEvents.map((event) => event.untilMs), nowMs());
    },

    setPhaseTimer(game, durationMs) {
      game.phaseUntilMs = nowMs() + Number(durationMs || 0);
    },

    phaseElapsed(game) {
      return nowMs() >= Number(game.phaseUntilMs || 0);
    },

    uiDiceMs() {
      return Number(CONFIG.ui && CONFIG.ui.diceAnimationMs ? CONFIG.ui.diceAnimationMs : 720);
    },

    uiIntroMs() {
      return Number(CONFIG.ui && CONFIG.ui.messageIntroMs ? CONFIG.ui.messageIntroMs : 700);
    },

    getMessageHoldMs(tone) {
      const ui = CONFIG.ui || {};

      if (tone === "critical") {
        return Number(ui.criticalMessageHoldMs || 4700);
      }

      if (tone === "release") {
        return Number(ui.releaseMessageHoldMs || 5200);
      }

      if (tone === "result") {
        return Number(ui.resultMessageHoldMs || 5200);
      }

      if (tone === "stim") {
        return Number(ui.stimMessageHoldMs || 4200);
      }

      return Number(ui.normalMessageHoldMs || 3600);
    },

    actionStartApp() {
      this.stopAllOutputs("起動");
      this.state.phase = "SETUP";
      this.state.safeReason = "";
      this.state.paused = false;
      this.state.viewerMode = false;

    },

    actionGoSetup() {

      this.state.safeReason = "";
      this.state.paused = false;
      this.state.viewerMode = false;
      this.state.activeGame = null;
      this.state.uiMessage = "セットアップへ戻りました";
    },

    actionGoGameSelect() {
      this.stopAllOutputs("ゲーム選択へ移動");
      this.state.phase = "GAME_SELECT";
      this.state.safeReason = "";
      this.state.paused = false;

    actionGoConfig() {

      this.state.phase = "CONFIG";
      this.state.safeReason = "";
      this.state.paused = false;

    },

    actionGoSpectator() {
      this.state.phase = "SPECTATOR";
      this.state.safeReason = "";
      this.state.paused = false;
      this.state.viewerMode = true;
      this.state.uiMessage = "観戦画面を表示しています";
    },

    actionUpdatePlayer(payload) {
      const player = this.getPlayer(payload.playerId);

      if (!player) {
        return;
      }

      const keys = [
        "name",
        "reading",
        "enabled",
        "outputEnabled",
        "limit",
        "testStim",
        "colorIndex",
        "assignment"
      ];

      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(payload, key)) {
          player[key] = payload[key];
        }
      }

      player.limit = clamp(player.limit, 0, 100);
      player.testStim = clamp(player.testStim, 0, 100);

      if (!player.enabled || !player.outputEnabled) {
        this.setPlayerOutput(player.id, 0, "出力OFF");
      }

      this.rebuildAssignments();
      this.state.uiMessage = `${player.name} を更新しました`;
    },

    actionUpdateConfig(payload) {
      const section = payload.section;
      const key = payload.key;

      if (!section || !key || !CONFIG[section]) {
        return;
      }

      CONFIG[section][key] = payload.value;
      this.state.config = CONFIG;
      this.state.uiMessage = "設定を更新しました";
    },

    actionTestStart(payload) {
      const player = this.getPlayer(payload.playerId);

      if (!player) {
        return;
      }

      const ttl = Number(CONFIG.safety && CONFIG.safety.testOutputTtlMs ? CONFIG.safety.testOutputTtlMs : 300);
      this.testHold = {
        playerId: player.id,
        expireAtMs: nowMs() + ttl
      };

      this.setPlayerOutput(player.id, player.testStim, "テスト出力");
      this.state.uiMessage = `${player.name} テスト出力中`;
    },

    actionTestStop(payload) {
      const playerId = payload.playerId;

      if (this.testHold && this.testHold.playerId === playerId) {
        this.testHold = null;
      }

      this.setPlayerOutput(playerId, 0, "テスト停止");
      this.state.uiMessage = "テスト出力を停止しました";
    },

    actionSelectGame(payload) {
      const game = this.getGameCatalogItem(payload.gameId);

      if (!game) {
        return;
      }

      if (game.status !== "available") {
        this.state.uiMessage = "このゲームは近日対応です";
        return;
      }

      this.stopAllOutputs("ゲーム選択");
      this.state.selectedGameId = game.id;
      this.state.uiMessage = `${game.title} を選択しました`;
    },

    actionStartSelectedGame() {

    resetPlayers() {

      for (const player of this.state.players) {

        player.realOutput = 0.0;

    startDiceDebt() {
      this.stopAllOutputs("ゲーム開始");
      this.resetPlayers();

      const cfg = CONFIG.diceDebt || {};

      this.state.phase = "PLAYING";
      this.state.paused = false;
      this.state.viewerMode = false;
      this.state.safeReason = "";
      this.state.activeGame = {
        id: "dice_debt",
        title: "ダイス負債バトル",
        status: "WAIT_P1",
        round: 1,
        turn: "p1",
        maxRounds: Number(cfg.rounds || 10),
        suddenDeath: false,
        attackerId: "p1",
        defenderId: "p2",
        message: "P1のダイスを振ってください",
        speechText: "P1のダイスを振ってください",
        messageTone: "normal",
        phaseUntilMs: null,
        countdownUntilMs: null,
        settlementUntilMs: null,
        winnerId: "",
        winnerName: "",
        reason: "",
        lastRoll: "",
        lastAction: "",

        lastDamage: 0,
        lastDebtDelta: 0,
        lastDiff: 0,
        lastLoserId: "",

        pendingRoundResult: null,

        pendingPulseEvents: [],
        pulseEvents: [],

    },

    startHpCrash() {

      this.state.phase = "PLAYING";

      this.state.activeGame = {

        round: 1,
        turn: "p1",
        maxRounds: 0,

        attackerId: "p1",

        message: "P1の攻撃。2D6を振ってください",
        speechText: "P1の攻撃。2D6を振ってください",
        messageTone: "normal",
        phaseUntilMs: null,
        countdownUntilMs: null,
        settlementUntilMs: null,
        winnerId: "",

        reason: "",
        lastRoll: "",
        lastAction: "",
        lastCategory: "",
        lastDamage: 0,
        lastDebtDelta: 0,
        lastDiff: 0,
        lastLoserId: "",
        lastWinnerId: "",
        lastDiceOwnerId: "",
        pendingRoundResult: null,
        pendingHpResult: null,
        pendingPulseEvents: [],
        pulseEvents: [],
        pulseUntilMs: null,
        lastDiceFaces: [],
        diceFaces: { p1: null, p2: null },
        dice: { p1: null, p2: null, last: null }
      };

      this.state.uiMessage = "HPクラッシュバトル開始";
    },

    actionRollDice() {
      const game = this.state.activeGame;

      if (!game || this.state.paused || this.state.phase !== "PLAYING") {
        return;
      }

      if (game.id === "dice_debt") {
        this.actionRollDiceDebt(game);
      } else if (game.id === "hp_crash") {
        this.actionRollHpCrash(game);
      }
    },

    actionRollDiceDebt(game) {
      if (game.status !== "WAIT_P1" && game.status !== "WAIT_P2") {
        return;
      }

      const cfg = CONFIG.diceDebt || {};
      const sides = Number(cfg.diceSides || 6);
      const roll = dice(sides);

      if (game.status === "WAIT_P1") {
        game.pendingRoundResult = {
          ownerId: "p1",
          roll
        };
        game.lastDiceOwnerId = "p1";
        game.lastDiceFaces = [];
        game.status = "DICE_ROLLING_P1";
        game.message = "P1 ダイスロール...";
        game.speechText = game.message;
        game.messageTone = "normal";
        this.setPhaseTimer(game, this.uiDiceMs());
        return;
      }

      if (game.status === "WAIT_P2") {
        game.pendingRoundResult = {
          ownerId: "p2",
          roll
        };
        game.lastDiceOwnerId = "p2";
        game.lastDiceFaces = [];
        game.status = "DICE_ROLLING_P2";
        game.message = "P2 ダイスロール...";
        game.speechText = game.message;
        game.messageTone = "normal";
        this.setPhaseTimer(game, this.uiDiceMs());
      }
    },

    updateDiceDebtStateMachine(game) {
      if (game.status === "DICE_ROLLING_P1" && this.phaseElapsed(game)) {
        const pending = game.pendingRoundResult || {};
        const roll = Number(pending.roll || 1);

        game.dice.p1 = roll;
        game.dice.last = roll;
        game.diceFaces.p1 = roll;
        game.lastDiceFaces = [roll];
        game.pendingRoundResult = null;
        game.turn = "p2";
        game.status = "WAIT_P2";

        const p1 = this.getPlayer("p1");
        const p2 = this.getPlayer("p2");

        game.message = `${p1.name} の出目は ${roll}。\n${p2.name} のダイスを振ってください`;
        game.speechText = game.message;
        game.messageTone = "normal";
        this.state.uiMessage = game.message;
        return;
      }

      if (game.status === "DICE_ROLLING_P2" && this.phaseElapsed(game)) {
        const pending = game.pendingRoundResult || {};
        const roll = Number(pending.roll || 1);
        const p1 = this.getPlayer("p1");
        const p2 = this.getPlayer("p2");
        const cfg = CONFIG.diceDebt || {};

        game.dice.p2 = roll;
        game.dice.last = roll;
        game.diceFaces.p2 = roll;
        game.lastDiceFaces = [roll];
        game.pendingRoundResult = null;

        const p1Roll = Number(game.dice.p1 || 1);
        const p2Roll = Number(game.dice.p2 || 1);
        const diff = Math.abs(p1Roll - p2Roll);
        const debtMultiplier = Number(cfg.debtMultiplier || 5);
        const drawDebt = Number(cfg.drawDebt || 3);

        let loser = null;
        let winner = null;
        let debtDelta = drawDebt;
        let message = "";

        if (p1Roll === p2Roll) {
          p1.debt = clamp(p1.debt + drawDebt, 0, 100);
          p2.debt = clamp(p2.debt + drawDebt, 0, 100);
          message = `${p1.name} ${p1Roll} / ${p2.name} ${p2Roll}。\n引き分け、双方に刺激負債 +${drawDebt}`;
          game.lastAction = "draw";
          game.lastLoserId = "";
          game.lastWinnerId = "";
          game.lastDebtDelta = drawDebt;
          game.lastDiff = 0;
          game.pendingPulseEvents = [
            this.makePendingPulseEvent("p1", Number(cfg.settlementDurationMs || 900), Number(cfg.settlementBonusPercent || 5), 3, "引き分け刺激"),
            this.makePendingPulseEvent("p2", Number(cfg.settlementDurationMs || 900), Number(cfg.settlementBonusPercent || 5), 3, "引き分け刺激")
          ];
        } else {
          if (p1Roll < p2Roll) {
            loser = p1;
            winner = p2;
          } else {
            loser = p2;
            winner = p1;
          }

          debtDelta = diff * debtMultiplier;
          loser.debt = clamp(loser.debt + debtDelta, 0, 100);
          message = `${p1.name} ${p1Roll} / ${p2.name} ${p2Roll}。\n${winner.name} の勝ち。\n${loser.name} に刺激負債 +${debtDelta}`;
          game.lastAction = "round_lose";
          game.lastLoserId = loser.id;
          game.lastWinnerId = winner.id;
          game.lastDebtDelta = debtDelta;
          game.lastDiff = diff;
          game.pendingPulseEvents = [
            this.makePendingPulseEvent(
              loser.id,
              Number(cfg.settlementDurationMs || 900),
              Number(cfg.settlementBonusPercent || 5),
              3,
              "精算刺激"
            )
          ];
        }

        game.status = "ROUND_REVEAL_INTRO";
        game.message = message;
        game.speechText = message;
        game.messageTone = "stim";
        this.state.uiMessage = message;
        this.setPhaseTimer(game, this.uiIntroMs());
        return;
      }

      if (game.status === "ROUND_REVEAL_INTRO" && this.phaseElapsed(game)) {
        game.status = "ROUND_REVEAL_FULL";
        this.setPhaseTimer(game, this.getMessageHoldMs(game.messageTone));
        return;
      }

      if (game.status === "ROUND_REVEAL_FULL" && this.phaseElapsed(game)) {
        if ((game.pendingPulseEvents || []).length > 0) {
          this.activatePendingPulses(game);
          game.status = "SETTLEMENT_PULSE";
          game.messageTone = "stim";
        } else {
          game.status = "ROUND_END_HOLD";
          this.setPhaseTimer(game, 700);
        }
        return;
      }

      if (game.status === "SETTLEMENT_PULSE") {
        this.updatePulseEvents(game);

        if ((game.pulseEvents || []).length <= 0) {
          game.status = "ROUND_END_HOLD";
          this.setPhaseTimer(game, 700);
        }

        return;
      }

      if (game.status === "ROUND_END_HOLD" && this.phaseElapsed(game)) {
        const p1 = this.getPlayer("p1");
        const p2 = this.getPlayer("p2");

        if (Number(game.round || 1) >= Number(game.maxRounds || 10)) {
          if (p1.debt === p2.debt) {
            this.finishGame(null, "同点で終了しました。");
          } else {
            const winner = p1.debt < p2.debt ? p1 : p2;
            const loser = winner.id === p1.id ? p2 : p1;
            this.finishGame(winner, `${winner.name} の勝利。${loser.name} より負債が少ないため。`);
          }
          return;
        }

        game.round = Number(game.round || 1) + 1;
        game.turn = "p1";
        game.status = "WAIT_P1";
        game.dice = { p1: null, p2: null, last: null };
        game.diceFaces = { p1: null, p2: null };
        game.lastDiceFaces = [];
        game.message = "P1のダイスを振ってください";
        game.speechText = game.message;
        game.messageTone = "normal";
        this.state.uiMessage = game.message;
      }
    },

    actionRollHpCrash(game) {
      if (game.status !== "WAIT_ATTACK") {
        return;
      }

      const cfg = CONFIG.hpCrash || {};
      const sides = Number(cfg.diceSides || 6);
      const d1 = dice(sides);
      const d2 = dice(sides);

      game.pendingHpResult = {
        attackerId: game.attackerId || game.turn || "p1",
        die1: d1,
        die2: d2
      };

      game.lastDiceOwnerId = game.pendingHpResult.attackerId;
      game.lastDiceFaces = [];
      game.status = "DICE_ROLLING_ATTACK";
      game.message = "攻撃ダイスロール...";
      game.speechText = game.message;
      game.messageTone = "normal";
      this.setPhaseTimer(game, this.uiDiceMs());
    },

    updateHpCrashStateMachine(game) {
      if (game.status === "DICE_ROLLING_ATTACK" && this.phaseElapsed(game)) {
        const pending = game.pendingHpResult || {};
        const attacker = this.getPlayer(pending.attackerId || "p1");
        const defender = this.getOtherPlayer(attacker.id);
        const cfg = CONFIG.hpCrash || {};
        const table = cfg.table || {};

        const d1 = Number(pending.die1 || 1);
        const d2 = Number(pending.die2 || 1);
        const total = d1 + d2;

        let category = "hit";
        let damage = Number(table.hit && table.hit.damage ? table.hit.damage : 10);
        let debt = Number(table.hit && table.hit.debt ? table.hit.debt : 10);
        let tone = "stim";
        let pendingPulse = null;

        if (table.fumble && total === Number(table.fumble.roll || 2)) {
          category = "fumble";
          damage = 0;
          debt = Number(table.fumble.selfDebt || 15);
          attacker.debt = clamp(attacker.debt + debt, 0, 100);

          pendingPulse = this.makePendingPulseEvent(

            Number(cfg.fumblePulseDurationMs || 900),
            0,
            Number(cfg.minFumbleStimPercent || 5),

          );
          game.message = `${attacker.name} は ${total}。\nファンブル、自己蓄積 +${debt}`;
        } else {
          if (table.graze && total >= Number(table.graze.min || 3) && total <= Number(table.graze.max || 5)) {
            category = "graze";
            damage = Number(table.graze.damage || 5);
            debt = Number(table.graze.debt || 5);
            pendingPulse = this.makePendingPulseEvent(defender.id, Number(cfg.normalPulseDurationMs || 900), 0, Number(cfg.minGrazeStimPercent || 3), "かすり刺激");
          } else if (table.hit && total >= Number(table.hit.min || 6) && total <= Number(table.hit.max || 8)) {
            category = "hit";
            damage = Number(table.hit.damage || 10);
            debt = Number(table.hit.debt || 10);
            pendingPulse = this.makePendingPulseEvent(defender.id, Number(cfg.normalPulseDurationMs || 900), 0, Number(cfg.minHitStimPercent || 4), "ヒット刺激");
          } else if (table.strong && total >= Number(table.strong.min || 9) && total <= Number(table.strong.max || 11)) {
            category = "strong";
            damage = Number(table.strong.damage || 15);
            debt = Number(table.strong.debt || 15);
            tone = "critical";
            pendingPulse = this.makePendingPulseEvent(defender.id, Number(cfg.strongPulseDurationMs || 1000), Number(cfg.strongSettlementBonusPercent || 5), Number(cfg.minStrongStimPercent || 6), "強打刺激");
          } else {
            category = "critical";
            damage = Number(table.critical && table.critical.damage ? table.critical.damage : 25);
            debt = Number(table.critical && table.critical.debt ? table.critical.debt : 25);
            tone = "critical";
            pendingPulse = this.makePendingPulseEvent(defender.id, Number(cfg.criticalPulseDurationMs || 1200), Number(cfg.criticalSettlementBonusPercent || 8), Number(cfg.minCriticalStimPercent || 8), "クリティカル刺激");
          }

          defender.hp = clamp(defender.hp - damage, 0, 100);
          defender.debt = clamp(defender.debt + debt, 0, 100);
          game.message = `${attacker.name} は ${total}。\n${this.categoryLabel(category)}、${defender.name} に ${damage} ダメージ / 蓄積 +${debt}`;
        }

        game.pendingHpResult = null;
        game.pendingPulseEvents = pendingPulse ? [pendingPulse] : [];
        game.dice = { p1: d1, p2: d2, last: total };
        game.diceFaces = { p1: d1, p2: d2 };
        game.lastDiceFaces = [d1, d2];
        game.lastDiceOwnerId = attacker.id;
        game.lastRoll = total;
        game.lastAction = "attack";
        game.lastCategory = category;
        game.lastDamage = damage;
        game.lastDebtDelta = debt;
        game.status = "HP_REVEAL_INTRO";
        game.messageTone = tone;
        game.speechText = game.message;
        this.state.uiMessage = game.message;
        this.setPhaseTimer(game, this.uiIntroMs());

        if (attacker.hp <= 0 || defender.hp <= 0) {
          game.pendingWinnerId = attacker.hp <= 0 ? defender.id : attacker.id;
          game.pendingLoserId = attacker.hp <= 0 ? attacker.id : defender.id;
        }

        return;
      }

      if (game.status === "HP_REVEAL_INTRO" && this.phaseElapsed(game)) {
        game.status = "HP_REVEAL_FULL";
        this.setPhaseTimer(game, this.getMessageHoldMs(game.messageTone));
        return;
      }

      if (game.status === "HP_REVEAL_FULL" && this.phaseElapsed(game)) {
        if ((game.pendingPulseEvents || []).length > 0) {
          this.activatePendingPulses(game);
          game.status = "HP_EVENT_PULSE";
        } else {
          game.status = "HP_AFTER_HOLD";
          this.setPhaseTimer(game, 700);
        }
        return;
      }

      if (game.status === "HP_EVENT_PULSE") {
        this.updatePulseEvents(game);

        if ((game.pulseEvents || []).length <= 0) {
          if (game.pendingWinnerId) {
            const winner = this.getPlayer(game.pendingWinnerId);
            const loser = this.getPlayer(game.pendingLoserId);
            this.finishGame(winner, `${loser.name} のHPが0になりました。`);
            return;
          }

          game.status = "HP_AFTER_HOLD";
          this.setPhaseTimer(game, 700);
        }

        return;
      }

      if (game.status === "HP_AFTER_HOLD" && this.phaseElapsed(game)) {
        const attacker = this.getPlayer(game.attackerId || game.turn || "p1");
        const defender = this.getOtherPlayer(attacker.id);

        game.attackerId = defender.id;
        game.defenderId = attacker.id;
        game.turn = defender.id;

        if (defender.id === "p1") {
          game.round = Number(game.round || 1) + 1;
        }

        game.status = "WAIT_ATTACK";
        game.message = `${defender.name} の攻撃。2D6を振ってください`;
        game.speechText = game.message;
        game.messageTone = "normal";
        this.state.uiMessage = game.message;
      }
    },

    categoryLabel(category) {
      if (category === "graze") return "かすり";
      if (category === "hit") return "ヒット";
      if (category === "strong") return "強打";
      if (category === "critical") return "クリティカル";
      if (category === "fumble") return "ファンブル";
      return category;
    },

    actionReleasePower() {

        return;
      }

      if (game.status !== "WAIT_ATTACK") {

      }

      const cfg = CONFIG.hpCrash || {};
      const attacker = this.getPlayer(game.attackerId || game.turn || "p1");
      const defender = this.getOtherPlayer(attacker.id);
      const threshold = Number(cfg.releaseThreshold || 30);

      if (attacker.releaseUsed) {
        game.message = `${attacker.name} は蓄積解放をすでに使用済みです`;
        game.speechText = game.message;
        game.messageTone = "normal";

        game.messageTone = "normal";

        return;

      const d1 = dice(6);
      const d2 = dice(6);

      game.pendingHpResult = {
        release: true,

        die1: d1,
        die2: d2

      game.lastDiceOwnerId = attacker.id;
      game.status = "DICE_ROLLING_RELEASE";
      game.message = "蓄積解放ロール...";
      game.speechText = game.message;
      game.messageTone = "release";
      this.setPhaseTimer(game, this.uiDiceMs());

      const originalUpdate = this.updateHpCrashStateMachine.bind(this);

      game.releaseResolver = true;
    },

    updateReleaseStateMachine(game) {
      if (game.status !== "DICE_ROLLING_RELEASE" || !this.phaseElapsed(game)) {
        return false;
      }

      const pending = game.pendingHpResult || {};
      const cfg = CONFIG.hpCrash || {};
      const attacker = this.getPlayer(pending.attackerId || game.attackerId || "p1");
      const defender = this.getOtherPlayer(attacker.id);
      const d1 = Number(pending.die1 || 1);
      const d2 = Number(pending.die2 || 1);
      const total = d1 + d2;

      attacker.releaseUsed = true;

      let pendingPulse = null;

      if (total >= 8) {
        const damage = Math.round(Number(cfg.releaseSuccessBaseDamage || 10) + attacker.debt / Number(cfg.releaseDamageDebtDivisor || 2.0));
        const debt = Number(cfg.releaseSuccessTargetDebt || 20);

        defender.hp = clamp(defender.hp - damage, 0, 100);
        defender.debt = clamp(defender.debt + debt, 0, 100);

        pendingPulse = this.makePendingPulseEvent(
          defender.id,
          Number(cfg.releaseSuccessPulseDurationMs || 1500),
          Number(cfg.releaseSuccessTargetBonusPercent || 8),
          Number(cfg.minReleaseSuccessStimPercent || 10),
          "蓄積解放成功"
        );

        game.message = `${attacker.name} の蓄積解放成功。\n${defender.name} に ${damage} ダメージ`;
        game.lastAction = "release_success";
        game.lastDamage = damage;
        game.lastDebtDelta = debt;
      } else {
        const selfDamage = Number(cfg.releaseFailureSelfDamage || 8);

        attacker.hp = clamp(attacker.hp - selfDamage, 0, 100);

        pendingPulse = this.makePendingPulseEvent(
          attacker.id,
          Number(cfg.releaseFailurePulseDurationMs || 1200),
          Number(cfg.releaseFailureSelfBonusPercent || 6),
          Number(cfg.minReleaseFailureStimPercent || 8),
          "蓄積解放失敗"
        );

        game.message = `${attacker.name} の蓄積解放失敗。\n反動で ${selfDamage} ダメージ`;
        game.lastAction = "release_failure";
        game.lastDamage = selfDamage;
        game.lastDebtDelta = 0;
      }

      game.pendingHpResult = null;
      game.pendingPulseEvents = pendingPulse ? [pendingPulse] : [];
      game.dice = { p1: d1, p2: d2, last: total };
      game.diceFaces = { p1: d1, p2: d2 };
      game.lastDiceFaces = [d1, d2];
      game.lastDiceOwnerId = attacker.id;
      game.lastRoll = total;
      game.status = "HP_REVEAL_INTRO";
      game.messageTone = "release";
      game.speechText = game.message;
      this.state.uiMessage = game.message;
      this.setPhaseTimer(game, this.uiIntroMs());

      if (attacker.hp <= 0 || defender.hp <= 0) {
        game.pendingWinnerId = attacker.hp <= 0 ? defender.id : attacker.id;
        game.pendingLoserId = attacker.hp <= 0 ? attacker.id : defender.id;
      }

      return true;
    },

    actionAdvanceMessage() {
      const game = this.state.activeGame;

      if (!game) {
        return;
      }

      if (game.id === "dice_debt") {
        if (game.status === "ROUND_REVEAL_FULL") {
          game.phaseUntilMs = 0;
          this.updateDiceDebtStateMachine(game);
        } else if (game.status === "ROUND_END_HOLD") {
          game.phaseUntilMs = 0;
          this.updateDiceDebtStateMachine(game);
        }
      } else if (game.id === "hp_crash") {
        if (game.status === "HP_REVEAL_FULL") {
          game.phaseUntilMs = 0;
          this.updateHpCrashStateMachine(game);
        } else if (game.status === "HP_AFTER_HOLD") {
          game.phaseUntilMs = 0;
          this.updateHpCrashStateMachine(game);
        }
      }
    },

    actionGiveUp(payload) {
      const game = this.state.activeGame;
      const loser = this.getPlayer(payload.playerId || (game && game.turn) || "p1");

      if (!loser) {
        return;
      }

      const winner = this.getOtherPlayer(loser.id);
      loser.gaveUp = true;
      this.finishGame(winner, `${loser.name} がギブアップしました。`);
    },

    actionPauseToggle() {
      if (this.state.paused) {
        this.actionResumeGame();
      } else {
        this.actionPauseGame();
      }
    },

    actionPauseGame() {
      this.state.paused = true;
      this.stopAllOutputs("一時停止");
      this.state.uiMessage = "一時停止しました";
    },

    actionResumeGame() {
      this.state.paused = false;
      this.state.safeReason = "";
      this.state.uiMessage = "再開しました";
    },

    actionEmergencyStop() {
      this.stopAllOutputs("緊急停止");
      this.state.phase = "SAFE_LOCKED";
      this.state.paused = false;
      this.state.viewerMode = false;
      this.state.safeReason = "緊急停止しました";
      this.state.uiMessage = "緊急停止しました";
    },

    actionResumeFromSafe() {
      this.stopAllOutputs("安全状態解除");
      this.state.phase = "GAME_SELECT";
      this.state.paused = false;
      this.state.viewerMode = false;
      this.state.safeReason = "";
      this.state.activeGame = null;
      this.state.uiMessage = "安全状態を解除しました";
    },

    actionReturnToGameSelect() {
      this.actionGoGameSelect();
    },

    actionVisibilityStop() {
      if (CONFIG.safety && CONFIG.safety.visibilityStop) {
        this.stopAllOutputs("画面非表示");
        this.state.uiMessage = "画面非表示のため出力を0%にしました";
      }
    },

    actionSetDeviceStatus(payload) {
      const device = this.state.estimDevices.find((item) => item.id === payload.deviceId);

      if (!device) {
        return;
      }

      const previousStatus = device.status;

      device.status = payload.status || device.status;
      device.lastSeenMs = nowMs();

      if (payload.safeState) {
        device.safeState = payload.safeState;
      } else if ((previousStatus === "disconnected" || previousStatus === "reconnecting") && device.status === "connected") {
        device.safeState = "SAFE_RECONNECTED";
      } else if (device.status === "connected") {
        device.safeState = "READY";
      } else if (device.status === "reconnecting") {
        device.safeState = "RECONNECTING";
      } else {
        device.safeState = "DISCONNECTED";
      }

      this.stopAllOutputs("デバイス状態変更");
      this.state.uiMessage = `${device.label} 状態変更: ${device.safeState}`;
    },

    actionClearSafeReconnected(payload) {
      const device = this.state.estimDevices.find((item) => item.id === payload.deviceId);

      if (!device) {
        return;
      }

      if (device.safeState === "SAFE_RECONNECTED") {
        this.stopAllOutputs("SAFE_RECONNECTED解除");
        device.safeState = device.status === "connected" ? "READY" : device.safeState;
        this.state.uiMessage = `${device.label} の再接続安全状態を解除しました`;
      }
    },

    updatePulseEvents(game) {
      const currentMs = nowMs();
      const remaining = [];

      for (const event of game.pulseEvents || []) {
        const player = this.getPlayer(event.playerId);

        if (!player) {
          continue;
        }

        if (currentMs <= Number(event.untilMs || 0)) {
          const value = this.calculateEventOutput(player, event.bonusPercent, event.minPercent);
          this.setPlayerOutput(player.id, value, event.reason);
          remaining.push(event);
        } else {
          this.setPlayerOutput(player.id, 0, "パルス終了");
        }
      }

      game.pulseEvents = remaining;
    },

    tick() {
      if (this.testHold && nowMs() >= Number(this.testHold.expireAtMs || 0)) {
        this.setPlayerOutput(this.testHold.playerId, 0, "テストTTL自動停止");
        this.testHold = null;
      }

      if (this.state.paused) {
        for (const player of this.state.players) {
          player.virtualOutput = 0.0;
          player.realOutput = 0.0;
        }

        this.broadcast();
        return;
      }

      if (this.state.phase !== "PLAYING" && this.state.phase !== "SPECTATOR") {
        this.broadcast();
        return;
      }

      const game = this.state.activeGame;

      if (!game) {
        this.broadcast();
        return;
      }

      if (game.id === "dice_debt") {
        this.updateDiceDebtStateMachine(game);
      } else if (game.id === "hp_crash") {
        if (!this.updateReleaseStateMachine(game)) {
          this.updateHpCrashStateMachine(game);
        }
      }

      this.broadcast();
    },

    finishGame(winner, reason) {
      this.stopAllOutputs("決着", false);

      const game = this.state.activeGame || {};

      this.state.phase = "RESULT";
      this.state.paused = false;
      this.state.viewerMode = false;
      this.state.safeReason = "";
      this.state.activeGame = {
        ...game,
        status: "RESULT",
        winnerId: winner ? winner.id : "",
        winnerName: winner ? winner.name : "",
        reason: reason || "",
        message: winner ? `${winner.name} 勝利` : "引き分け",
        speechText: winner ? `${winner.name} 勝利` : "引き分け",
        messageTone: "result"
      };
      this.state.uiMessage = this.state.activeGame.message;
    }
  };

  class MockWebSocket {
    constructor(url) {
      this.url = url;
      this.readyState = WS_CONNECTING;
      this.binaryType = "blob";
      this.bufferedAmount = 0;
      this.extensions = "";
      this.protocol = "";
      this.onopen = null;
      this.onmessage = null;
      this.onclose = null;
      this.onerror = null;
      this.listeners = {
        open: [],
        message: [],
        close: [],
        error: []
      };

      mockServer.connect(this);
    }

    addEventListener(type, listener) {
      if (!this.listeners[type]) {
        this.listeners[type] = [];
      }

      this.listeners[type].push(listener);
    }

    removeEventListener(type, listener) {
      if (!this.listeners[type]) {
        return;
      }

      this.listeners[type] = this.listeners[type].filter((item) => item !== listener);
    }

    send(data) {
      if (this.readyState !== WS_OPEN) {
        return;
      }

      mockServer.handleRaw(data);
    }

    close() {
      if (this.readyState === WS_CLOSED || this.readyState === WS_CLOSING) {
        return;
      }

      this.readyState = WS_CLOSING;
      mockServer.disconnect(this);
      this.readyState = WS_CLOSED;
      this.dispatch("close", {
        type: "close",
        code: 1000,
        reason: "mock close",
        wasClean: true
      });
    }

    _open() {
      if (this.readyState !== WS_CONNECTING) {
        return;
      }

      this.readyState = WS_OPEN;
      this.dispatch("open", {
        type: "open"
      });
    }

    _emitMessage(packet) {
      if (this.readyState !== WS_OPEN) {
        return;
      }

      this.dispatch("message", {
        type: "message",
        data: JSON.stringify(packet)
      });
    }

    dispatch(type, event) {
      const handler = this["on" + type];

      if (typeof handler === "function") {
        try {
          handler.call(this, event);
        } catch (error) {
          console.error(error);
        }
      }

      for (const listener of this.listeners[type] || []) {
        try {
          listener.call(this, event);
        } catch (error) {
          console.error(error);
        }
      }
    }
  }

  MockWebSocket.CONNECTING = WS_CONNECTING;
  MockWebSocket.OPEN = WS_OPEN;
  MockWebSocket.CLOSING = WS_CLOSING;
  MockWebSocket.CLOSED = WS_CLOSED;

  window.WebSocket = MockWebSocket;
  window.__REARENA_MOCK_SERVER__ = mockServer;

  setInterval(() => {
    mockServer.tick();
  }, 50);
})();

function renderRichMessageLine(message, className = "") {
  let html = escapeHtml(message || "");

  if (appState && Array.isArray(appState.players)) {
    const tokens = [];

    for (const player of appState.players) {
      if (player.name) {
        tokens.push({ text: player.name, colorIndex: player.colorIndex || 1 });
      }

      if (player.id) {
        tokens.push({ text: player.id.toUpperCase(), colorIndex: player.colorIndex || 1 });
      }
    }

    const uniqueTokens = [];
    const seen = new Set();

    for (const token of tokens) {
      if (!token.text || seen.has(token.text)) {
        continue;
      }

      seen.add(token.text);
      uniqueTokens.push(token);
    }

    uniqueTokens.sort((a, b) => b.text.length - a.text.length);

    for (const token of uniqueTokens) {
      const escapedToken = escapeHtml(token.text);
      const colored = `<span class="player-name-inline tone-text-${clampClient(token.colorIndex, 1, 6)}">${escapedToken}</span>`;
      html = html.split(escapedToken).join(colored);
    }
  }

  return `<div class="game-message-line ${className}">${html}</div>`;
}

function renderMessageBox(message, tone = "normal") {
  const lines = String(message || "")
    .split("\n")
    .map((line) => line.trim())
    .filter((line) => line.length > 0)
    .slice(-3);

  while (lines.length < 1) {
    lines.push("");
  }

  return `
    <div class="game-message-box tone-${escapeHtml(tone)}">
      ${lines
        .map((line, index) => {
          if (index === 0) {
            return renderRichMessageLine(line, "");
          }

          if (index === 1) {
            return renderRichMessageLine(line, "sub");
          }

          return renderRichMessageLine(line, "detail");
        })
        .join("")}
    </div>
  `;
}

function send(type, payload = {}) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    logLocal(`送信失敗: ${type} / WebSocket未接続`);
    return;
  }

  ws.send(
    JSON.stringify({
      type,
      payload,
    })
  );
}

function connectWebSocket() {
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  const url = `${protocol}//${location.host}/ws`;

  ws = new WebSocket(url);

  ws.addEventListener("open", () => {
    logLocal("WebSocket接続");
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  });

  ws.addEventListener("message", (event) => {
    try {
      const data = JSON.parse(event.data);

      if (data.type === "state") {
        appState = data.payload;
        observeStateForLogs();
        observeStateForAudio();
        render();
        updateDynamicFields();
      }
    } catch (error) {
      console.error(error);
    }
  });

  ws.addEventListener("close", () => {
    logLocal("WebSocket切断：再接続待機");

    if (reconnectTimer) {
      return;
    }

    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connectWebSocket();
    }, WS_RECONNECT_MS);
  });

  ws.addEventListener("error", () => {
    try {
      ws.close();
    } catch (error) {
      console.error(error);
    }
  });
}

function observeStateForLogs() {
  if (!appState) {
    return;
  }

  if (appState.uiMessage && appState.uiMessage !== lastLoggedUiMessage) {
    lastLoggedUiMessage = appState.uiMessage;
    logLocal(appState.uiMessage);
  }

  if (appState.lastOutputStopReason && appState.lastOutputStopReason !== lastLoggedStopReason) {
    lastLoggedStopReason = appState.lastOutputStopReason;
    logLocal(`安全操作: ${appState.lastOutputStopReason}`);
  }
}

function observeStateForAudio() {
  if (!appState) {
    return;
  }

  const game = appState.activeGame || {};
  const speechText = game.speechText || game.message || appState.uiMessage || "";
  const tone = game.messageTone || "normal";
  const key = [
    speechText,
    tone,
    game.status || "",
    game.round || "",
    game.turn || "",
    game.countdownUntilMs || "",
    game.phaseUntilMs || "",
  ].join("|");

  if (!speechText) {
    return;
  }

  if (key !== lastSoundKey) {
    lastSoundKey = key;
    playToneForMessage(tone);
  }

  if (speechText && speechText !== lastSpokenText) {
    lastSpokenText = speechText;
    speakMessage(speechText, tone);
  }
}

function makeRenderKey(state) {
  const activeGame = state.activeGame || {};
  const players = state.players || [];

  const playerKey = players
    .map((player) => {
      return [

        player.name,
        player.reading,
        player.enabled,
        player.outputEnabled,
        player.limit,
        player.testStim,
        player.hp,
        player.debt,
        player.releaseUsed,
        player.colorIndex,
        player.assignment ? `${player.assignment.estimDeviceId}:${player.assignment.channel}` : "none",
        player.gaveUp,
      ].join(":");
    })
    .join("|");

  const deviceKey = (state.estimDevices || [])
    .map((device) => {
      return `${device.id}:${device.status}:${device.safeState}`;
    })
    .join("|");

  const gameKey = [
    activeGame.id || "",
    activeGame.status || "",
    activeGame.round || "",
    activeGame.turn || "",
    activeGame.maxRounds || "",
    activeGame.suddenDeath || "",
    activeGame.attackerId || "",
    activeGame.defenderId || "",
    activeGame.message || "",
    activeGame.speechText || "",
    activeGame.messageTone || "",
    activeGame.phaseUntilMs || "",
    activeGame.winnerId || "",
    activeGame.winnerName || "",
    activeGame.reason || "",
    activeGame.lastRoll || "",
    activeGame.lastAction || "",
    activeGame.lastCategory || "",
    activeGame.lastDamage || "",
    activeGame.lastDebtDelta || "",
    activeGame.lastDiff || "",
    activeGame.lastLoserId || "",
    activeGame.lastWinnerId || "",
    activeGame.lastDiceOwnerId || "",
    activeGame.countdownUntilMs || "",
    activeGame.settlementUntilMs || "",
    activeGame.pendingRoundResult ? JSON.stringify(activeGame.pendingRoundResult) : "",
    activeGame.pendingHpResult ? JSON.stringify(activeGame.pendingHpResult) : "",
    activeGame.pendingPulseEvents ? JSON.stringify(activeGame.pendingPulseEvents) : "",
    activeGame.lastDiceFaces ? activeGame.lastDiceFaces.join(",") : "",
    activeGame.diceFaces ? JSON.stringify(activeGame.diceFaces) : "",
    activeGame.dice ? activeGame.dice.p1 : "",
    activeGame.dice ? activeGame.dice.p2 : "",
    activeGame.dice ? activeGame.dice.last : "",
  ].join(":");

  return [
    state.phase,
    state.viewerMode ? "viewer" : "operator",
    state.paused ? "paused" : "running",
    state.safeReason || "",
    state.selectedGameId || "",
    state.uiMessage || "",
    deviceKey,
    playerKey,
    gameKey,
    screenRotated ? "rotated" : "normal",
    availableVoices.length,
  ].join("||");
}

function isUserEditing() {
  const activeElement = document.activeElement;

  if (!activeElement) {
    return false;
  }

  return (
    activeElement.tagName === "INPUT" ||
    activeElement.tagName === "SELECT" ||
    activeElement.tagName === "TEXTAREA"
  );
}

function applyScreenRotation() {
  if (!appShell) {
    return;
  }

  if (screenRotated) {
    appShell.classList.add("screen-rotated");
  } else {
    appShell.classList.remove("screen-rotated");
  }
}

function resetRotationOutsideGame() {
  if (!appState) {
    return;
  }

  if (appState.phase !== "PLAYING" && screenRotated) {
    screenRotated = false;
  }
}

function render() {
  if (!appState || modalOpen) {
    return;
  }

  if (isUserEditing()) {
    return;
  }

  resetRotationOutsideGame();

  const nextRenderKey = makeRenderKey(appState);

  if (nextRenderKey === lastRenderKey) {
    applyScreenRotation();
    return;
  }

  lastRenderKey = nextRenderKey;

  const phase = appState.phase;

  if (phase === "START") {
    renderStart();
  } else if (phase === "SETUP") {
    renderSetup();
  } else if (phase === "GAME_SELECT") {
    renderGameSelect();
  } else if (phase === "CONFIG") {
    renderConfig();
  } else if (phase === "PLAYING") {
    renderPlaying();
  } else if (phase === "SPECTATOR") {
    renderSpectator();
  } else if (phase === "RESULT") {
    renderResult();
  } else if (phase === "SAFE_LOCKED") {
    renderSafeLocked();
  } else {
    renderStart();
  }

  applyScreenRotation();
  applyGaugeTiming();
  animateGaugesAfterRender();
}

function forceRender() {
  lastRenderKey = "";
  render();
  updateDynamicFields();
}

function updateDynamicFields() {
  if (!appState) {
    return;
  }

  for (const player of appState.players || []) {
    updatePlayerDynamicFields(player);
  }

  updateDiceDisplays();
  updateOutputLog();
  updatePhaseHint();
}

function applyGaugeTiming() {
  const ui = getUiConfig();
  const ms = Number(ui.gaugeAnimationMs || 520);

  document.documentElement.style.setProperty("--gauge-ms", `${clampClient(ms, 0, 2000)}ms`);
}

function animatedWidthStyle(key, currentValue) {
  const safeCurrent = clampClient(currentValue, 0, 100);
  const previous = previousGaugeValues.has(key) ? previousGaugeValues.get(key) : safeCurrent;

  return `width:${clampClient(previous, 0, 100)}%`;
}

function animateGaugesAfterRender() {
  const gaugeTargets = document.querySelectorAll("[data-gauge-key]");

  if (gaugeTargets.length === 0) {
    return;
  }

  requestAnimationFrame(() => {
    gaugeTargets.forEach((el) => {
      const key = el.dataset.gaugeKey;
      const target = clampClient(el.dataset.gaugeValue, 0, 100);
      el.style.width = `${target}%`;
      previousGaugeValues.set(key, target);
    });
  });
}

function updateGaugeNow(key, value) {
  const target = clampClient(value, 0, 100);
  document.querySelectorAll(`[data-gauge-key="${CSS.escape(key)}"]`).forEach((el) => {
    el.dataset.gaugeValue = String(target);
    el.style.width = `${target}%`;
    previousGaugeValues.set(key, target);
  });
}

function renderPhaseHint(game) {
  if (!game) {
    return "";
  }

  if (ROLLING_STATUSES.has(game.status)) {
    return `<div class="message-advance-hint" data-phase-hint>ダイス演出中...</div>`;
  }

  if (game.status === "HP_EVENT_PULSE" || game.status === "SETTLEMENT_PULSE" || game.status === "FINAL_RESULT_PULSE") {
    return `<div class="message-advance-hint ready" data-phase-hint>刺激発生中</div>`;
  }

  return `<div class="message-advance-hint hidden" data-phase-hint></div>`;
}

function updatePhaseHint() {
  const hint = document.querySelector("[data-phase-hint]");

  if (!hint || !appState?.activeGame) {
    return;
  }

  const game = appState.activeGame;

  if (ROLLING_STATUSES.has(game.status)) {
    hint.classList.remove("hidden");
    hint.textContent = "ダイス演出中...";
  } else if (game.status === "HP_EVENT_PULSE" || game.status === "SETTLEMENT_PULSE" || game.status === "FINAL_RESULT_PULSE") {
    hint.classList.remove("hidden");
    hint.textContent = "刺激発生中";
  } else {
    hint.classList.add("hidden");
    hint.textContent = "";
  }
}

    button.addEventListener("click", () => {
      const player = getPlayer(button.dataset.playerId);
      promptNumber("テスト刺激", Number(player?.testStim || 0), 0, 100, (value) => {
        send("update_player", {
          playerId: button.dataset.playerId,
          patch: { testStim: value },
        });
      });
    });
  });

  document.querySelectorAll("[data-switch-player]").forEach((button) => {
    button.addEventListener("click", () => {
      const player = getPlayer(button.dataset.switchPlayer);

      if (!player) {
        return;
      }

      const key = button.dataset.switchKey;

      send("update_player", {
        playerId: player.id,
        patch: { [key]: !player[key] },
      });
    });
  });

  document.querySelectorAll(".player-device-select, .player-channel-select").forEach((select) => {
    select.addEventListener("change", () => {
      const playerId = select.dataset.playerId;
      const deviceSelect = document.querySelector(`.player-device-select[data-player-id="${CSS.escape(playerId)}"]`);
      const channelSelect = document.querySelector(`.player-channel-select[data-player-id="${CSS.escape(playerId)}"]`);

      send("update_player", {
        playerId,
        patch: {
          assignment: {
            estimDeviceId: deviceSelect ? deviceSelect.value : "",
            channel: channelSelect ? channelSelect.value : "",
          },
        },
      });
    });
  });

  document.querySelectorAll(".test-hold-button").forEach((button) => {
    const playerId = button.dataset.playerId;

    const start = (event) => {
      event.preventDefault();
      unlockAudio();
      button.textContent = "テスト中... 離すと停止";
      send("test_start", { playerId });

      if (testHoldTimers.has(playerId)) {
        clearInterval(testHoldTimers.get(playerId));
      }

      const timer = setInterval(() => {
        send("test_start", { playerId });
      }, 220);

      testHoldTimers.set(playerId, timer);
    };

    const stop = (event) => {
      if (event) {
        event.preventDefault();
      }

      button.textContent = "押している間だけテスト";

      if (testHoldTimers.has(playerId)) {
        clearInterval(testHoldTimers.get(playerId));
        testHoldTimers.delete(playerId);
      }

      send("test_stop", { playerId });
    };

    button.addEventListener("pointerdown", start);
    button.addEventListener("pointerup", stop);
    button.addEventListener("pointercancel", stop);
    button.addEventListener("pointerleave", stop);
  });
}

function promptNumber(title, current, min, max, callback) {
  const raw = window.prompt(`${title} (${min}〜${max})`, String(current));

  if (raw === null) {
    return;
  }

  const value = clampClient(Number(raw), min, max);

  if (Number.isNaN(value)) {
    return;
  }

  callback(value);
}

function bindConfig() {
  document.getElementById("btn-save-config").addEventListener("click", () => {
    send("save_config", {});
  });

  document.getElementById("btn-back-game-select").addEventListener("click", () => {
    send("go_game_select", {});

  });

  document.getElementById("btn-back-setup").addEventListener("click", () => {
    send("go_setup", {});
    scrollTopSoon();
  });

  const voiceSelect = document.getElementById("voice-select");

  if (voiceSelect) {
    voiceSelect.addEventListener("change", () => {
      sendConfigPatch("audio", "voiceName", voiceSelect.value);
    });
  }

  const speechTest = document.getElementById("btn-test-speech");

  if (speechTest) {
    speechTest.addEventListener("click", () => {
      unlockAudio();
      loadVoices();
      playToneForMessage("notice", true);
      speakText("リアリーナ、音声テストです。", true);
      setTimeout(() => {
        forceRender();
      }, 200);
    });
  }

  document.querySelectorAll(".config-range").forEach((range) => {
    range.addEventListener("input", () => {
      const numberButton = document.querySelector(
        `.config-number[data-section="${CSS.escape(range.dataset.section)}"][data-key="${CSS.escape(range.dataset.key)}"]`
      );

      if (numberButton) {
        numberButton.textContent = range.value;
      }
    });

    range.addEventListener("change", () => {
      const section = range.dataset.section;
      const key = range.dataset.key;
      let value = Number(range.value);

      if (section === "audio" && ["speechRate", "speechPitch", "speechVolume"].includes(key)) {
        value = value / 100;
      }

      sendConfigPatch(section, key, value);
    });
  });

  document.querySelectorAll(".config-number").forEach((button) => {
    button.addEventListener("click", () => {
      const current = Number(button.textContent);
      const min = Number(button.dataset.min);
      const max = Number(button.dataset.max);

      promptNumber(button.textContent, current, min, max, (value) => {
        let finalValue = value;

        if (button.dataset.section === "audio" && ["speechRate", "speechPitch", "speechVolume"].includes(button.dataset.key)) {
          finalValue = value / 100;
        }

        sendConfigPatch(button.dataset.section, button.dataset.key, finalValue);
      });
    });
  });

  document.querySelectorAll(".config-bool").forEach((button) => {
    button.addEventListener("click", () => {
      const current = button.dataset.value === "true";
      sendConfigPatch(button.dataset.section, button.dataset.key, !current);
    });
  });
}

function sendConfigPatch(section, key, value) {
  send("update_config", {
    patch: {
      [section]: {
        [key]: value,
      },
    },
  });
}

function bindGiveButton(button, playerId) {
  if (!button) {
    return;
  }

  let timer = null;
  const original = button.textContent;
  const holdMs = Number(getSafetyConfig().giveUpHoldMs || 1000);

  const start = (event) => {
    event.preventDefault();
    event.stopPropagation();

    button.textContent = "長押し中...";

    timer = setTimeout(() => {
      playToneForMessage("critical", true);
      send("give_up", { playerId });
    }, holdMs);
  };

  const cancel = (event) => {
    if (event) {
      event.stopPropagation();
    }

    clearTimeout(timer);
    button.textContent = original;
  };

  button.addEventListener("pointerdown", start);
  button.addEventListener("pointerup", cancel);
  button.addEventListener("pointercancel", cancel);
  button.addEventListener("pointerleave", cancel);
}

function canRoll(game) {
  if (!game) {
    return false;
  }

  return game.status === "WAIT_P1" || game.status === "WAIT_P2";
}

function canAttack(game) {
  if (!game) {
    return false;
  }

  return game.status === "WAIT_ATTACK";
}

function canUseRelease(player) {
  if (!player) {
    return false;
  }

  const game = appState.activeGame;

  if (!game || game.status !== "WAIT_ATTACK") {
    return false;
  }

  if (player.releaseUsed) {
    return false;
  }

  const threshold = Number(getGameConfig("hpCrash").releaseThreshold || 30);

  return Number(player.debt || 0) >= threshold;
}

  const limit = clampClient(player.limit, 0, 100);

  updateGaugeNow(`${player.id}-mini-hp`, hp);
  updateGaugeNow(`${player.id}-spectator-hp`, hp);

  updateGaugeNow(`${player.id}-debt`, debt);
  updateGaugeNow(`${player.id}-mini-debt`, debt);
  updateGaugeNow(`${player.id}-spectator-debt`, debt);

  updateGaugeNow(`${player.id}-output`, output);
