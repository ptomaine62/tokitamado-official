<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時珠堂 - ギャラリー</title>
    <style>
        /* 洗練されたミニマルなデザイン */
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; color: #222; margin: 0; background: #fff; line-height: 1.6; }
        .header { text-align: center; padding: 2rem 1rem; }
        .header a { color: #999; text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
        .header a:hover { color: #222; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem 5rem; }
        
        .lens-title { text-align: center; font-size: 1.5rem; font-weight: normal; margin-bottom: 3rem; color: #111; letter-spacing: 0.05em; }
        
        .photo-section { margin-bottom: 6rem; }
        .photo-section img { width: 100%; height: auto; display: block; }
        
        /* 写真右下の機材情報（ラベルなしでスマートに） */
        .meta-info { text-align: right; font-size: 0.75rem; color: #888; margin-top: 0.5rem; letter-spacing: 0.05em; }
        
        /* 文章ブロック */
        .text-block { max-width: 700px; margin: 2.5rem auto 0; font-size: 1rem; line-height: 1.9; color: #333; }
    </style>
</head>
<body>
    <div class="header"><a href="index.html">← GALLERY</a></div>
    
    <div class="container" id="content">
        <p style="text-align: center; color: #999;">読み込み中...</p>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        fetch('lenses.json').then(r => r.json()).then(data => {
            const lens = data.find(l => l.id === id);
            if (!lens) { document.getElementById('content').innerHTML = "<p style='text-align:center;'>レンズが見つかりません。</p>"; return; }
            
            document.title = `${lens.name} - 時珠堂`;
            
            // 機材情報の文字列をスマートに生成（例: Minolta MC Rokkor-PF 50mm F1.7）
            const equipmentInfo = `${lens.maker} ${lens.name} / ${lens.focalLength} ${lens.aperture}`;
            
            let html = `<h1 class="lens-title">${lens.name}</h1>`;

            // 写真と文章を「写真→文字」の順でループ出力
            lens.images.forEach((img, index) => {
                html += `
                <div class="photo-section">
                    <img src="${img.url}" alt="${lens.name}" loading="lazy">
                    <div class="meta-info">${equipmentInfo}</div>
                `;
                
                // 1枚目の写真の下には「レンズの総評（poem）」を表示、2枚目以降は「写真ごとのキャプション」を表示
                const textToShow = index === 0 ? lens.poem : img.caption;
                
                if (textToShow && textToShow.trim() !== '') {
                    // 改行を反映させる
                    const formattedText = textToShow.replace(/\n/g, '<br>');
                    html += `<div class="text-block">${formattedText}</div>`;
                }
                
                html += `</div>`;
            });

            document.getElementById('content').innerHTML = html;
        });
    </script>
</body>
</html>
