<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時珠堂 Admin Center v3</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'M PLUS 1p', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .card { background: #fff; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { color: #0089A7; margin-top: 0; font-size: 1.4rem; border-left: 5px solid #0089A7; padding-left: 15px; }
        
        /* タブUI */
        .tabs { display: flex; margin: 20px 0; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 1rem; cursor: pointer; color: #888; font-family: inherit; transition: 0.3s; }
        .tab-btn.active { color: #0089A7; font-weight: bold; border-bottom: 3px solid #0089A7; margin-bottom: -2px; }
        
        .section { display: none; }
        .section.active { display: block; }

        h2 { font-size: 1rem; margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8rem; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; font-family: inherit; }
        
        button.action-btn { margin-top: 25px; width: 100%; padding: 15px; background: #0089A7; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.action-btn:hover { background: #006b83; }
        
        .danger-btn { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; width: 100%; padding: 15px; margin-top: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .danger-btn:hover { background: #feebeb; }

        #status { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .hidden { display: none !important; }
        
        /* 画像プレビュー用 */
        .img-item { background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; position: relative; margin-top:10px; }
        .img-item img { width: 100%; max-width: 200px; height: auto; border-radius: 4px; display:block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>時珠堂 総合管理パネル Ver 3.0</h1>
        
        <label>🔑 GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_...">

        <div class="tabs">
            <button class="tab-btn active" id="tabLens">📷 レンズ図鑑</button>
            <button class="tab-btn" id="tabFanart">🎨 Fan Art</button>
        </div>

        <div id="secLens" class="section active">
            <select id="lensSelect"><option value="new">🆕 新しいレンズ／記事を登録する</option></select>
            
            <div id="lensForm">
                <label>レンズ名 (英: Montserrat)</label>
                <input type="text" id="l_name" list="name-list">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label>メーカー</label><input type="text" id="l_maker"></div>
                    <div><label>カテゴリ</label><input type="text" id="l_category"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                    <div><label>焦点距離</label><input type="text" id="l_focal"></div>
                    <div><label>F値</label><input type="text" id="l_aperture"></div>
                    <div><label>発売年</label><input type="text" id="l_year"></div>
                </div>
                <label>ID (URL用/変更不可)</label>
                <input type="text" id="l_id" placeholder="minolta-50mm">
                <label>記事本文 (1枚目の写真の下に表示)</label>
                <textarea id="l_poem" rows="5"></textarea>
                
                <div id="existingImages" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                
                <h2>4. 写真の追加 (末尾に追加)</h2>
                <input type="file" id="lensImageInput" accept="image/*">
                <label>個別コメント</label>
                <textarea id="lensImgCaption" rows="2"></textarea>
                
                <button id="lensSaveBtn" class="action-btn">🚀 レンズ記事を保存・更新</button>
                <button id="lensDelBtn" class="danger-btn hidden">⚠️ このレンズ記事を完全に削除</button>
            </div>
            <datalist id="name-list"></datalist>
        </div>

        <div id="secFanart" class="section">
            <select id="faSelect"><option value="new">🆕 新しいFanArtを登録する</option></select>
            
            <div id="faForm">
                <label>作者名（クリエイター名）</label>
                <input type="text" id="fa_author" placeholder="例: 名無しの着ぐるみさん">
                
                <label>メディアの種類</label>
                <select id="fa_type">
                    <option value="x_url">🐦 X(Twitter) のURLを引用する</option>
                    <option value="image">📁 画像ファイルを直接アップロードする</option>
                </select>

                <div id="fa_input_x">
                    <label>X(Twitter)の投稿URL</label>
                    <input type="text" id="fa_x_url" placeholder="https://x.com/username/status/123456789">
                </div>

                <div id="fa_input_img" class="hidden">
                    <label>画像ファイルを選択</label>
                    <input type="file" id="faImageInput" accept="image/*">
                </div>

                <label>時珠堂からのコメント（お礼など）</label>
                <textarea id="fa_comment" rows="4" placeholder="素敵なイラストありがとうございます！..."></textarea>
                
                <input type="hidden" id="fa_id"> <button id="faSaveBtn" class="action-btn">🚀 FanArtを保存・更新</button>
                <button id="faDelBtn" class="danger-btn hidden">⚠️ このFanArtを削除</button>
            </div>
        </div>

        <canvas id="canvas" class="hidden"></canvas>
        <div id="status"></div>
    </div>

    <script>
        const OWNER = 'ptomaine62';
        const REPO = 'tokitamado-official';
        
        let lensData = [], lensSha = '';
        let faData = [], faSha = '';

        // --- タブ切り替え制御 ---
        document.getElementById('tabLens').onclick = () => switchTab('Lens');
        document.getElementById('tabFanart').onclick = () => switchTab('Fanart');
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`tab${tab}`).classList.add('active');
            document.getElementById(`sec${tab}`).classList.add('active');
            document.getElementById('status').style.display = 'none';
        }

        // --- FanArtの入力切り替え ---
        document.getElementById('fa_type').onchange = (e) => {
            document.getElementById('fa_input_x').classList.toggle('hidden', e.target.value === 'image');
            document.getElementById('fa_input_img').classList.toggle('hidden', e.target.value === 'x_url');
        };

        // --- 初期データ読み込み ---
        async function loadJson(file) {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file}`);
            const data = await res.json();
            return { sha: data.sha, content: JSON.parse(decodeURIComponent(escape(atob(data.content)))) };
        }

        async function init() {
            try {
                // Lenses読み込み
                const lRes = await loadJson('lenses.json');
                lensSha = lRes.sha; lensData = lRes.content;
                const lSel = document.getElementById('lensSelect');
                lensData.forEach(l => {
                    lSel.appendChild(new Option(`📝 編集: ${l.name}`, l.id));
                    document.getElementById('name-list').appendChild(new Option(l.name, l.name));
                });

                // FanArt読み込み（ファイルがない場合は新規作成とみなす）
                try {
                    const fRes = await loadJson('fanart.json');
                    faSha = fRes.sha; faData = fRes.content;
                    const fSel = document.getElementById('faSelect');
                    faData.forEach(f => fSel.appendChild(new Option(`📝 編集: ${f.author}様の作品`, f.id)));
                } catch(e) { faData = []; } // 初回など

            } catch(e) { console.error("Load Error:", e); }
        }
        init();

        // --- GitHub保存共通関数 ---
        async function saveToGithub(fileName, newData, sha, message) {
            const token = document.getElementById('ghToken').value;
            if(!token) throw new Error("No Token");
            const updatedJson = JSON.stringify(newData, null, 2);
            const encoded = btoa(unescape(encodeURIComponent(updatedJson)));
            
            const payload = { message: message, content: encoded };
            if(sha) payload.sha = sha; // 新規作成時はsha不要

            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${fileName}`, {
                method: 'PUT', headers: { 'Authorization': `token ${token}` }, body: JSON.stringify(payload)
            });
            return await res.json();
        }

        function showStatus(msg, isError = false) {
            const s = document.getElementById('status');
            s.style.display = 'block';
            s.style.background = isError ? '#ffebee' : '#e8f5e9';
            s.style.color = isError ? '#c62828' : '#2e7d32';
            s.textContent = msg;
        }

        // --- 画像アップロード共通関数 ---
        async function uploadImage(fileInputId) {
            const file = document.getElementById(fileInputId).files[0];
            if(!file) return null;
            const token = document.getElementById('ghToken').value;
            
            const img = new Image(); img.src = URL.createObjectURL(file);
            await new Promise(r => img.onload = r);
            const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
            let w = img.width, h = img.height;
            if(w > 1920) { h = Math.round(h * 1920 / w); w = 1920; }
            cvs.width = w; cvs.height = h; ctx.drawImage(img, 0, 0, w, h);
            
            const b64 = cvs.toDataURL('image/webp', 0.8).split(',')[1];
            const fname = `images/fa_${Date.now()}.webp`;

            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${fname}`, {
                method: 'PUT', headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: 'Upload Image', content: b64 })
            });
            return fname;
        }

        // =========================================================
        // FanArt側のロジック
        // =========================================================
        document.getElementById('faSelect').onchange = (e) => {
            const id = e.target.value;
            const delBtn = document.getElementById('faDelBtn');
            if(id === 'new') {
                document.getElementById('fa_author').value = '';
                document.getElementById('fa_x_url').value = '';
                document.getElementById('fa_comment').value = '';
                document.getElementById('fa_id').value = '';
                delBtn.classList.add('hidden');
            } else {
                const fa = faData.find(f => f.id === id);
                document.getElementById('fa_author').value = fa.author;
                document.getElementById('fa_type').value = fa.type;
                document.getElementById('fa_type').dispatchEvent(new Event('change'));
                if(fa.type === 'x_url') document.getElementById('fa_x_url').value = fa.content;
                document.getElementById('fa_comment').value = fa.comment;
                document.getElementById('fa_id').value = fa.id;
                delBtn.classList.remove('hidden');
            }
        };

        // FanArt 保存
        document.getElementById('faSaveBtn').onclick = async () => {
            try {
                showStatus("⏳ 保存中...", false);
                const isNew = document.getElementById('faSelect').value === 'new';
                const type = document.getElementById('fa_type').value;
                
                let contentVal = '';
                if(type === 'x_url') {
                    contentVal = document.getElementById('fa_x_url').value;
                } else {
                    contentVal = await uploadImage('faImageInput');
                    // 既存編集時で画像再アップロードがない場合は既存のURLを維持
                    if(!contentVal && !isNew) contentVal = faData.find(f=>f.id===document.getElementById('fa_id').value).content;
                }

                const newObj = {
                    id: isNew ? `fa_${Date.now()}` : document.getElementById('fa_id').value,
                    type: type,
                    content: contentVal,
                    author: document.getElementById('fa_author').value,
                    comment: document.getElementById('fa_comment').value,
                    date: new Date().toISOString().split('T')[0]
                };

                if(isNew) { faData.unshift(newObj); } 
                else { const idx = faData.findIndex(f=>f.id === newObj.id); faData[idx] = newObj; }

                const res = await saveToGithub('fanart.json', faData, faSha, "Update FanArt");
                faSha = res.content.sha; // 次回のためにSHAを更新
                showStatus("✅ FanArtを保存しました！", false);
                setTimeout(() => location.reload(), 1500);
            } catch(e) { showStatus("❌ エラー: " + e.message, true); }
        };

        // FanArt 削除
        document.getElementById('faDelBtn').onclick = async () => {
            if(!confirm("このFanArtを削除しますか？")) return;
            try {
                showStatus("⏳ 削除中...", false);
                const id = document.getElementById('fa_id').value;
                faData = faData.filter(f => f.id !== id);
                await saveToGithub('fanart.json', faData, faSha, "Delete FanArt");
                showStatus("✅ 削除しました。", false);
                setTimeout(() => location.reload(), 1500);
            } catch(e) { showStatus("❌ エラー", true); }
        };

        // =========================================================
        // レンズ側のロジック（既存機能を凝縮して移植）
        // =========================================================
        document.getElementById('lensSelect').onchange = (e) => {
            const id = e.target.value;
            const delBtn = document.getElementById('lensDelBtn');
            if(id === 'new') {
                ['l_name','l_maker','l_focal','l_aperture','l_year','l_category','l_id','l_poem'].forEach(i => document.getElementById(i).value='');
                document.getElementById('l_id').readOnly = false;
                document.getElementById('existingImages').innerHTML = '';
                delBtn.classList.add('hidden');
            } else {
                const l = lensData.find(item => item.id === id);
                ['name','maker','focalLength','aperture','year','category','id','poem'].forEach(k => {
                    document.getElementById('l_'+(k==='focalLength'?'focal':k)).value = l[k]||'';
                });
                document.getElementById('l_id').readOnly = true;
                delBtn.classList.remove('hidden');
                
                document.getElementById('existingImages').innerHTML = l.images.map((img, i) => `
                    <div class="img-item" id="l_img_row_${i}">
                        <img src="${img.url}"><textarea id="l_cap_${i}" rows="2" style="margin-top:5px;font-size:0.8rem">${img.caption||''}</textarea>
                        <button type="button" class="danger-btn" style="padding:5px" onclick="document.getElementById('l_img_row_${i}').remove()">🗑️ 写真削除</button>
                    </div>`).join('');
            }
        };

        document.getElementById('lensSaveBtn').onclick = async () => {
            try {
                showStatus("⏳ 保存中...", false);
                const id = document.getElementById('lensSelect').value;
                const isNew = (id === 'new');
                
                let cur = isNew ? {images:[]} : lensData.find(l => l.id === id);
                ['name','maker','focalLength','aperture','year','category','id','poem'].forEach(k => {
                    cur[k] = document.getElementById('l_'+(k==='focalLength'?'focal':k)).value;
                });

                let upImgs = [];
                if(!isNew) {
                    const orig = lensData.find(l => l.id === id).images;
                    orig.forEach((img, i) => {
                        if(document.getElementById(`l_img_row_${i}`)) upImgs.push({ url: img.url, date: img.date, caption: document.getElementById(`l_cap_${i}`).value });
                    });
                }
                cur.images = upImgs;

                const newImgUrl = await uploadImage('lensImageInput');
                if(newImgUrl) cur.images.push({ url: newImgUrl, caption: document.getElementById('lensImgCaption').value, date: new Date().toISOString().split('T')[0] });

                if(isNew) lensData.unshift(cur);
                const res = await saveToGithub('lenses.json', lensData, lensSha, "Update Lens");
                lensSha = res.content.sha;
                showStatus("✅ レンズ記事を保存しました！", false);
                setTimeout(() => location.reload(), 1500);
            } catch(e) { showStatus("❌ エラー: " + e.message, true); }
        };

        document.getElementById('lensDelBtn').onclick = async () => {
            if(!confirm("レンズ記事を削除しますか？")) return;
            showStatus("⏳ 削除中...", false);
            lensData = lensData.filter(l => l.id !== document.getElementById('l_id').value);
            await saveToGithub('lenses.json', lensData, lensSha, "Delete Lens");
            showStatus("✅ 削除しました。", false);
            setTimeout(() => location.reload(), 1500);
        };
    </script>
</body>
</html>
