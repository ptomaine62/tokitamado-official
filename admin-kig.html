<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時珠堂 Admin Ver 4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', 'M PLUS 1p', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .card { background: #fff; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { color: #0089A7; margin-top: 0; font-size: 1.2rem; border-left: 5px solid #0089A7; padding-left: 15px; margin-bottom: 2rem; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 0.9rem; cursor: pointer; color: #888; font-family: inherit; }
        .tab-btn.active { color: #0089A7; font-weight: bold; border-bottom: 3px solid #0089A7; margin-bottom: -2px; }
        
        .section { display: none; }
        .section.active { display: block; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8rem; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; font-family: inherit; }
        
        .action-btn { margin-top: 25px; width: 100%; padding: 15px; background: #0089A7; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { background: #006b83; }
        .danger-btn { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; width: 100%; padding: 12px; margin-top: 15px; border-radius: 6px; cursor: pointer; }

        #status { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .hidden { display: none !important; }
        .img-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .img-item { background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .img-item img { width: 100%; height: 100px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="card">
        <h1>時珠堂 Control Panel v4.0</h1>
        
        <label>🔑 GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_...">

        <div class="tabs">
            <button class="tab-btn active" id="btnLens">📷 記事</button>
            <button class="tab-btn" id="btnFanart">🎨 頂き物</button>
            <button class="tab-btn" id="btnPickup">🐦 About用X</button>
        </div>

        <div id="secLens" class="section active">
            <select id="lSelect"><option value="new">🆕 新規登録</option></select>
            <div id="lForm">
                <label>レンズ名</label><input type="text" id="l_name">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>メーカー</label><input type="text" id="l_maker"></div>
                    <div><label>カテゴリ</label><input type="text" id="l_cat"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div><label>焦点距離</label><input type="text" id="l_focal"></div>
                    <div><label>F値</label><input type="text" id="l_aperture"></div>
                    <div><label>発売年</label><input type="text" id="l_year"></div>
                </div>
                <label>ID (URL用)</label><input type="text" id="l_id">
                <label>エッセイ</label><textarea id="l_poem" rows="4"></textarea>
                <div id="lImgs" class="img-preview"></div>
                <label>追加写真</label><input type="file" id="lFileInput" accept="image/*">
                <label>写真コメント</label><textarea id="lImgCap" rows="2"></textarea>
                <button id="lSave" class="action-btn">記事を更新</button>
                <button id="lDel" class="danger-btn hidden">この記事を削除</button>
            </div>
        </div>

        <div id="secFanart" class="section">
            <select id="fSelect"><option value="new">🆕 新規登録</option></select>
            <div id="fForm">
                <label>作者名</label><input type="text" id="f_author">
                <label>種類</label><select id="f_type"><option value="x_url">XのURL</option><option value="image">直接アップ</option></select>
                <div id="f_x"><label>URL</label><input type="text" id="f_url"></div>
                <div id="f_img" class="hidden"><label>画像</label><input type="file" id="fFileInput"></div>
                <label>コメント</label><textarea id="f_comment" rows="3"></textarea>
                <button id="fSave" class="action-btn">FanArtを更新</button>
                <button id="fDel" class="danger-btn hidden">削除</button>
            </div>
        </div>

        <div id="secPickup" class="section">
            <p style="font-size:0.8rem; color:#888;">Aboutページの「#時珠堂 PICKUP」に表示するURLリストです。</p>
            <textarea id="p_list" rows="10" placeholder="1行に1つのURLを入力"></textarea>
            <button id="pSave" class="action-btn">ピックアップを更新</button>
        </div>

        <div id="status"></div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const OWNER = 'ptomaine62', REPO = 'tokitamado-official';
        let lensData = [], lensSha = '', faData = [], faSha = '', pickData = [], pickSha = '';

        async function api(path) {
            const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`);
            const d = await r.json();
            return { sha: d.sha, content: JSON.parse(decodeURIComponent(escape(atob(d.content)))) };
        }

        async function init() {
            try {
                const l = await api('lenses.json'); lensData = l.content; lensSha = l.sha;
                lensData.forEach(i => document.getElementById('lSelect').appendChild(new Option(i.name, i.id)));
                
                const f = await api('fanart.json'); faData = f.content; faSha = f.sha;
                faData.forEach(i => document.getElementById('fSelect').appendChild(new Option(`${i.author}様の作品`, i.id)));
                
                const p = await api('picked_posts.json'); pickData = p.content; pickSha = p.sha;
                document.getElementById('p_list').value = pickData.join('\n');

                // ブックマークレットからのURL受け取り
                const urlParams = new URLSearchParams(window.location.search);
                const sharedUrl = urlParams.get('url');
                if(sharedUrl) {
                    switchTab('Fanart');
                    document.getElementById('f_url').value = sharedUrl;
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status').textContent = "🐦 XのURLを受け取りました！作者名を入れて保存してください。";
                    document.getElementById('status').style.background = "#e1f5fe";
                }
            } catch(e) { console.error(e); }
        }
        init();

        // タブ切り替え
        function switchTab(t) {
            document.querySelectorAll('.tab-btn, .section').forEach(el => el.classList.remove('active'));
            document.getElementById('btn'+t).classList.add('active');
            document.getElementById('sec'+t).classList.add('active');
        }
        document.getElementById('btnLens').onclick = () => switchTab('Lens');
        document.getElementById('btnFanart').onclick = () => switchTab('Fanart');
        document.getElementById('btnPickup').onclick = () => switchTab('Pickup');

        document.getElementById('f_type').onchange = (e) => {
            document.getElementById('f_x').classList.toggle('hidden', e.target.value === 'image');
            document.getElementById('f_img').classList.toggle('hidden', e.target.value === 'x_url');
        };

        // 保存処理 (共通)
        async function save(file, data, sha, msg) {
            const token = document.getElementById('ghToken').value;
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file}`, {
                method: 'PUT', headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))), sha: sha })
            });
            if(res.ok) { alert("保存しました！反映まで1分ほどお待ちください。"); location.reload(); }
            else { alert("エラーが発生しました。トークンを確認してください。"); }
        }

        document.getElementById('pSave').onclick = () => {
            const list = document.getElementById('p_list').value.split('\n').filter(l => l.trim() !== '');
            save('picked_posts.json', list, pickSha, "Update Picked Posts");
        };

        // ... (レンズ、FanArtの個別保存・削除ロジックは前回同様ですが、簡略化して統合)
        // ※長くなるため主要な変更点のみ記載、実際にはv3のロジックをここに移植します
        
        document.getElementById('fSave').onclick = async () => {
            const isNew = document.getElementById('fSelect').value === 'new';
            const type = document.getElementById('f_type').value;
            let contentVal = document.getElementById('f_url').value;
            
            const newObj = {
                id: isNew ? `fa_${Date.now()}` : document.getElementById('fSelect').value,
                type: type, content: contentVal,
                author: document.getElementById('f_author').value,
                comment: document.getElementById('f_comment').value,
                date: new Date().toISOString().split('T')[0]
            };
            if(isNew) faData.unshift(newObj);
            else { const idx = faData.findIndex(f => f.id === newObj.id); faData[idx] = newObj; }
            save('fanart.json', faData, faSha, "Update FanArt");
        };
        
        // (lSave 等も同様に実装)
    </script>
</body>
</html>
