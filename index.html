<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時珠堂 - GALLERY</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --muju: #0089A7; --roni: #F3C759; --text: #222; }
        body { background: #fff; color: var(--text); font-family: 'Montserrat', 'M PLUS 1p', sans-serif; margin: 0; }
        
        /* 共通ナビゲーション */
        nav { display: flex; align-items: center; padding: 1.5rem 2rem; border-bottom: 1px solid #f0f0f0; sticky: top; background: #fff; z-index: 1000; }
        .nav-logo { font-weight: 700; letter-spacing: 0.2em; text-decoration: none; color: #111; margin-right: 3rem; }
        .nav-links { display: flex; gap: 2rem; flex: 1; }
        .nav-links a { text-decoration: none; color: #999; font-size: 0.8rem; letter-spacing: 0.1em; transition: 0.3s; }
        .nav-links a.active, .nav-links a:hover { color: var(--muju); }
        .nav-right { color: #ddd; font-size: 0.8rem; }
        .nav-right a { color: #999; text-decoration: none; border: 1px solid #eee; padding: 0.4rem 1rem; border-radius: 20px; transition: 0.3s; }
        .nav-right a:hover { border-color: var(--roni); color: var(--roni); }

        .filters { text-align: center; padding: 2rem 1rem 1rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .filter-btn { background: none; border: none; font-size: 0.75rem; color: #aaa; margin: 0 1rem; cursor: pointer; transition: 0.3s; letter-spacing: 0.1em; text-transform: uppercase; }
        .filter-btn.active { color: var(--text); font-weight: bold; border-bottom: 2px solid var(--muju); padding-bottom: 5px; }
        
        .gallery { padding: 2rem; column-count: auto; column-width: 320px; column-gap: 2rem; max-width: 1400px; margin: 0 auto; }
        .thumb { break-inside: avoid; margin-bottom: 2.5rem; cursor: pointer; text-decoration: none; display: block; color: inherit; transition: 0.4s; }
        .thumb:hover { opacity: 0.8; transform: translateY(-3px); }
        .thumb img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .thumb-info { padding: 1rem 0; }
        .thumb-info h3 { margin: 0; font-size: 0.9rem; font-weight: 400; letter-spacing: 0.05em; }
        .thumb-info p { margin: 0.4rem 0 0; font-size: 0.7rem; color: #bbb; letter-spacing: 0.05em; }

        @media (max-width: 768px) {
            nav { padding: 1rem; flex-direction: column; gap: 1rem; }
            .nav-logo { margin-right: 0; }
            .nav-links { gap: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">TOKITAMADO</a>
        <div class="nav-links">
            <a href="about.html">ABOUT</a>
            <a href="index.html" class="active">GALLERY</a>
            <a href="fanart.html">FAN ART</a>
        </div>
        <div class="nav-right"><a href="https://game.tokitamado.com">GAME SERVER</a></div>
    </nav>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
    </div>
    <div class="gallery" id="gallery"></div>

    <script>
        fetch('lenses.json').then(r => r.json()).then(data => {
            const gallery = document.getElementById('gallery');
            const filters = document.getElementById('filters');
            const makers = [...new Set(data.map(item => item.maker))].sort();
            
            makers.forEach(maker => { if(!maker) return;
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.filter = maker; btn.textContent = maker;
                filters.appendChild(btn);
            });

            const render = (filter) => {
                gallery.innerHTML = '';
                data.forEach(item => {
                    if (filter !== 'all' && item.maker !== filter) return;
                    const a = document.createElement('a');
                    a.href = `lens.html?id=${item.id}`; a.className = 'thumb';
                    a.innerHTML = `
                        <img src="${item.images[0].url}" alt="${item.name}" loading="lazy">
                        <div class="thumb-info">
                            <h3>${item.name}</h3>
                            <p>${item.maker} / ${item.focalLength} ${item.aperture}</p>
                        </div>
                    `;
                    gallery.appendChild(a);
                });
            };

            filters.onclick = e => { if (e.target.tagName !== 'BUTTON') return;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active'); render(e.target.dataset.filter);
            };
            render('all');
        });
    </script>
</body>
</html>
